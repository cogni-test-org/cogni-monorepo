#
# ExternalSecret for node-template on candidate-b. One service/env path is
# extracted from OpenBao into the single k8s Secret consumed by the workload.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-template-env-secrets
  namespace: cogni-candidate-b
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: node-template
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: node-template-env-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: candidate-b/node-template
