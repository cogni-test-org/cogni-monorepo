# Cogni Git Review Repository Specification Template
# Copy this file to .cogni/repo-spec.yaml and customize for your repository

schema_version: "0.1.4"

# Unique identity for this node deployment (infrastructure only).
# Scopes ledger tables alongside scope_id. Never used for governance domain.
# Generated once at init; must never change for an existing deployment.
# See: docs/spec/identity-model.md
node_id: "4ff8eac1-4eba-4ed0-931b-b1fe4f64713d"

# Governance domain (project). V0 default: 'default' (single-project node).
# Multi-scope: declare named scopes in .cogni/projects/*.yaml instead.
# scope_id is the canonical DB key (stable UUID FK); scope_key is the human-friendly slug.
# Derived: uuidv5(node_id, "default") — deterministic per deployment
scope_id: "a28a8b1e-1f9d-5cd5-9329-569e4819feda"
scope_key: "default"

# Activity ledger ingestion configuration
activity_ledger:
  epoch_length_days: 7
  approvers:
    - "0x070075F1389Ae1182aBac722B36CA12285d0c949" # derekg1729.eth operator wallet
  pool_config:
    base_issuance_credits: "10000"
  activity_sources:
    github:
      attribution_pipeline: cogni-v0.0
      source_refs: ["Cogni-DAO/standalone-node"]
      excluded_logins: ["Cogni-1729"]

intent:
  name: cogni-template

# Node registry — operator declares child nodes in the monorepo.
# Each entry points to a node dir with its own .cogni/repo-spec.yaml.
# Per REPO_SPEC_AUTHORITY: this is the node discovery source.
# Endpoints are Docker-internal URLs for LiteLLM callback routing.
nodes:
  - node_id: "4ff8eac1-4eba-4ed0-931b-b1fe4f64713d"
    node_name: "Cogni Operator"
    path: "nodes/operator"
    endpoint: "http://app:3000/api/internal/billing/ingest"
  - node_id: "5ed2d64f-2745-4676-983b-2fb7e05b2eba"
    node_name: "Poly Prediction"
    path: "nodes/poly"
    endpoint: "http://poly:3100/api/internal/billing/ingest"
  - node_id: "f6d2a17d-b7f6-4ad1-a86b-f0ad2380999e"
    node_name: "Resy Helper"
    path: "nodes/resy"
    endpoint: "http://resy:3300/api/internal/billing/ingest"

# Control GitHub check conclusion behavior for gate errors/timeouts
# false (default): errors/timeouts result in 'neutral' conclusion (non-blocking)
# true: errors/timeouts result in 'failure' conclusion (blocks merge)
fail_on_error: true

# Operator wallet configuration (Privy-managed)
# address: Privy-managed EOA that receives operator share from Split
# Split contract address lives in payments_in.credits_topup.receiving_address
operator_wallet:
  address: "0xdCCa8D85603C2CC47dc6974a790dF846f8695056" # Privy-managed operator wallet

cogni_dao:
  dao_contract: "0xF61c3fafD4D34b4568e7a500d92b28Ac175e83C6" # Current Cogni parent DAO Contract Address
  plugin_contract: "0x609B427f04C1C42De3e28898cb7b9Bad329e6b77" # DAO's Aragon Voting Plugin Address
  signal_contract: "0x590FC79B9c925C377fA63F4AaF54cdbF4Ee273A1" # DAO's CogniSignal Contract Address
  chain_id: "8453" # Chain ID: Eth Sepolia testnet
  base_url: "https://proposal.cognidao.org" # v0 Base URL: cogni-proposal-launcher service

# DAO Financial Rails Configuration
# Inbound payment configuration for USDC credits top-up
payments:
  status: active

payments_in:
  credits_topup:
    provider: cogni-usdc-backend-v1
    receiving_address: "0xDe4dE5e40f7215E4606c3e422D28cf01f97C8c66" # Push Split V2o2 — 92.1% operator / 7.9% DAO
    allowed_chains:
      - Base
    allowed_tokens:
      - USDC

providers:
  openrouter:
    api_host: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
  # cherryservers:
  #   api_host: https://api.cherryservers.com/v1
  #   api_key_env: CHERRY_API_TOKEN

llm_proxy:
  host_env: LITELLM_PROXY_URL
  master_key_env: LITELLM_MASTER_KEY

secrets:
  manager:
    type: env


review:
  enabled: true
  model: llama-3.3-70b

# Gates run in the order they appear below.
gates:
  # Built-in gates (run directly in bot process)
  - type: review-limits
    id: review_limits
    with:
      max_changed_files: 50
      max_total_diff_kb: 1500

  # Ensure */*/AGENTS.md files are updated when code changes
  # - type: agents-md-sync
  #   id: agents_md_sync
  # with:  # Optional configuration
  #   code_patterns: ["src/**/*.js", "lib/**/*.ts"]  # Files that require doc updates
  #   doc_pattern: "CLAUDE.md"                       # Documentation file to check. Default is AGENTS.md

  - type: ai-rule
    with:
      rule_file: pr-syntropy-coherence.yaml
  - type: ai-rule
    with:
      rule_file: patterns-and-docs.yaml
  - type: ai-rule
    with:
      rule_file: repo-goal-alignment.yaml

  ## template for adding a new rule.
  # - type: ai-rule
  #   with:
  #     rule_file: ai-rule-template.yaml

# Governance schedule definitions (charter-scoped per governance-council.md)
# Each schedule triggers a sandbox agent run with a 1-word entrypoint.
# Cron Format syntax: https://crontab.guru/
governance:
  schedules:
    - charter: HEARTBEAT
      cron: "0 * * * *" # once per hour — git delta check + Discord status
      timezone: UTC
      entrypoint: HEARTBEAT
    - charter: LEDGER_INGEST
      cron: "0 6 * * *" # daily at 6am UTC
      timezone: UTC
      entrypoint: LEDGER_INGEST
