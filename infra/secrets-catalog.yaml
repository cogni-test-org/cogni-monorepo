#
# Operator-domain secrets catalog. Holds entries that are NOT specific to a
# single node:
#   - service: _shared       — A1 secrets consumed by multiple services
#   - service: _system       — G-tier derived secrets (from repo state)
#   - service: poly          — A2 placeholder until cogni-poly ports its
#                              own nodes/poly/.cogni/secrets-catalog.yaml
#   - (no service)           — B/D/E-tier (Compose-infra, CI, repo-level)
#
# Each entry's `service:` field declares its OpenBao path (for A-tier/G-tier);
# B/D/E entries omit it.
#
# See docs/spec/secrets-classification.md for tier definitions.

secrets:
  # ── A1 — service: _shared (cross-service) ──────────────────────────────
  - name: LITELLM_MASTER_KEY
    tier: A1
    service: _shared
    coConsumed: true
    required: true
    category: Core App
    source: agent
    description: LiteLLM proxy master API key
    steps: ["Auto-generated sk-cogni-* key"]
    generate: { kind: sk-cogni, randHexBytes: 24 }

  - name: SCHEDULER_API_TOKEN
    tier: A1
    service: _shared
    required: true
    category: Internal Service
    source: agent
    description: scheduler-worker -> internal graph API auth
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }

  - name: GRAFANA_URL
    tier: A1
    service: _shared
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana instance URL — consumed by app + loki-query.sh + grafana-postgres-datasource.sh (cross-service per Invariant 1)
    url: https://grafana.com/orgs
    steps: ['e.g. "https://your-org.grafana.net"']

  - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
    tier: A1
    service: _shared
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana service account token. PR #54 introduces Phase 5e auto-mint (child SA from operator-provided GH_GRAFANA_PARENT_SA_TOKEN); operator-paste path remains for fork bootstrap before Phase 5e wires up.
    steps:
      - Grafana instance
      - Administration -> Service Accounts
      - Add service account with datasource read/query plus datasource create/write for setup runs
      - "Required permissions: datasources:read, datasources:query, datasources:create, datasources:write"
      - "Use a stack service-account token, usually prefixed glsa_; Grafana Cloud access-policy tokens prefixed glc_ do not authorize the Grafana instance HTTP API"
      - Use Grafana Cloud Private Data Source Connect (PDC) for private databases; do not expose Postgres publicly
      - Add token, copy it

  - name: GH_GRAFANA_URL
    tier: D
    required: false
    category: Observability (Grafana Cloud)
    source: human
    perEnv: true
    description: Operator-pasted Grafana stack URL (Phase 5e Grafana auto-mint input). Distinct from GRAFANA_URL because the parent SA token authenticates against THIS URL to mint the child SA whose URL lands at cogni/<env>/_shared/GRAFANA_URL. PR #54.
    steps:
      - "Paste the Grafana stack URL (e.g., https://<your-stack>.grafana.net, no trailing slash)"
      - "Used by Phase 5e (provision-grafana-cloud-mint.sh) at $URL/api/serviceaccounts"

  - name: GH_GRAFANA_PARENT_SA_TOKEN
    tier: D
    required: false
    category: Observability (Grafana Cloud)
    source: human
    perEnv: true
    description: Operator-pasted glsa_* parent SA token (Admin role) for Phase 5e Grafana child-SA mint. Per Invariant 13 — NEVER written to OpenBao, never reaches the VM; GH-env-secret + runner env only. PR #54.
    steps:
      - "Stack UI -> Admin -> Users and access -> Service accounts -> Add (Admin role) -> Add token"
      - "Copy the glsa_* token — MUST be glsa_, NOT glc_ (Cloud access-policy tokens don't authorize the instance HTTP API)"
      - "Preflight in Phase 5e rejects glc_*"

  - name: BILLING_INGEST_TOKEN
    tier: A1
    service: _shared
    coConsumed: true
    required: true
    category: Internal Service
    source: agent
    description: LiteLLM callback -> billing ingest endpoint auth
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }

  # ── DoltHub knowledge mirror (cross-service: operator + node-template both
  # run the post-merge mirror + knowledge API). Predate the catalog/tier system
  # — migrated here from the legacy inline SECRETS array. Consumed at runtime by
  # the app pod (envFrom); node-template consumption lands with PR #1377
  # (task.5077/5075). All optional — gate-by-presence (unset disables mirror). ─
  - name: DOLTHUB_REMOTE_URL
    tier: A1
    service: _shared
    required: false
    category: DoltHub Mirror
    source: human
    description: DoltHub remote URL — gates the push job; unset disables mirror
    steps:
      - 'Convention: "https://doltremoteapi.dolthub.com/<org>/<knowledge-repo>"'
      - Repo must exist on DoltHub first (https://www.dolthub.com/repositories/new)
      - Leave unset on dev/test to disable pushes

  - name: DOLT_CREDS_JWK
    tier: A1
    service: _shared
    required: false
    category: DoltHub Mirror
    source: human
    description: Dolt cred private key (JWK file contents) for push auth
    steps:
      - "On a host with the dolt CLI: dolt creds new"
      - Outputs a keyid + creates ~/.dolt/creds/<keyid>.jwk
      - Paste full file contents (single-line JSON) as the value
      - Register the pubkey at https://www.dolthub.com/settings/credentials
      - See docs/runbooks/dolthub-remote-bootstrap.md for the full ceremony

  - name: DOLT_CREDS_KEYID
    tier: A1
    service: _shared
    required: false
    category: DoltHub Mirror
    source: human
    description: Dolt cred keyid — matches the .jwk filename DOLT_CREDS_JWK came from
    steps:
      ["Same `dolt creds new` output — the keyid printed above the file path"]

  - name: DOLTHUB_OAUTH_CLIENT_ID
    tier: A1
    service: _shared
    required: false
    category: OAuth (DoltHub)
    source: human
    description: DoltHub OAuth App client ID (per-user identity, v1)
    url: https://www.dolthub.com/settings/oauth
    steps: [Sign in to DoltHub, OAuth Applications -> New, Copy Client ID]

  - name: DOLTHUB_OAUTH_CLIENT_SECRET
    tier: A1
    service: _shared
    required: false
    category: OAuth (DoltHub)
    source: human
    description: DoltHub OAuth App client secret (per-user identity, v1)
    url: https://www.dolthub.com/settings/oauth
    steps: [Same OAuth App, Generate or copy Client Secret]

  - name: DOLTHUB_API_TOKEN
    tier: A1
    service: _shared
    required: false
    category: OAuth (DoltHub)
    source: human
    description: DoltHub Personal Access Token for app-level knowledge push job
    url: https://www.dolthub.com/settings/tokens
    steps: [Sign in to DoltHub, Settings -> API Tokens -> Create]

  # ── G — service: _system (derived from repo state) ─────────────────────
  - name: COGNI_NODE_DBS
    tier: G
    service: _system
    required: true
    category: Infrastructure (derived)
    source: agent
    description: Comma-separated per-node database names (derived from nodes/*/)
    steps: ["Auto-derived from nodes/*/ directories (excludes node-template)"]
    generate: { kind: derived, source: node-dbs }

  - name: COGNI_NODE_ENDPOINTS
    tier: G
    service: _shared
    coConsumed: true
    required: true
    category: Infrastructure (derived)
    source: agent
    description: Per-node billing callback endpoints (derived from repo-spec node_ids + NodePort map)
    steps: ["Auto-derived from nodes/*/.cogni/repo-spec.yaml"]
    generate: { kind: derived, source: node-endpoints }

  # ── B — Compose-infra ──────────────────────────────────────────────────
  - name: OPENROUTER_API_KEY
    tier: B
    required: true
    category: Core App
    source: human
    description: OpenRouter LLM API key
    url: https://openrouter.ai/keys
    steps:
      - Create a new API key
      - "Copy the full key (starts with sk-)"

  - name: OPENCLAW_GITHUB_RW_TOKEN
    tier: B
    required: true
    category: Core App
    source: human
    description: GitHub PAT for OpenClaw git relay (push + PR)
    url: https://github.com/settings/tokens?type=beta
    steps:
      - Create fine-grained personal access token
      - "Resource owner: Cogni-DAO"
      - "Repository access: All repositories (or select repos)"
      - "Permissions:"
      - "  - Contents: Read and write"
      - "  - Pull requests: Read and write"

  - name: POSTGRES_ROOT_USER
    tier: B
    required: true
    category: Database
    source: agent
    description: Postgres superuser name
    steps: ['Convention: "postgres"']
    generate: { kind: static, value: postgres }

  - name: POSTGRES_ROOT_PASSWORD
    tier: B
    required: true
    category: Database
    source: agent
    description: Postgres superuser password
    steps: ["Auto-generated hex string (URL-safe for DSN construction)"]
    generate: { kind: hex, bytes: 24 }

  - name: APP_DB_READONLY_USER
    tier: B
    required: false
    category: Database
    source: agent
    description: Read-only Postgres user for Grafana/agent support queries
    steps: ['Convention: "app_readonly"']
    generate: { kind: static, value: app_readonly }

  - name: APP_DB_READONLY_PASSWORD
    tier: B
    required: false
    category: Database
    source: agent
    description: Read-only Postgres password; deploy-infra derives one from POSTGRES_ROOT_PASSWORD when unset
    steps: [Optional override for the derived read-only credential]
    generate: { kind: hex, bytes: 24 }

  - name: TEMPORAL_DB_USER
    tier: B
    required: true
    category: Database
    source: agent
    description: Temporal database user
    steps: ['Convention: "temporal"']
    generate: { kind: static, value: temporal }

  - name: TEMPORAL_DB_PASSWORD
    tier: B
    required: true
    category: Database
    source: agent
    description: Temporal database password
    steps: ["Auto-generated hex string (URL-safe for DSN construction)"]
    generate: { kind: hex, bytes: 24 }

  - name: GRAFANA_PDC_SIGNING_TOKEN
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Per-environment Grafana PDC signing token; authenticates the runtime pdc-agent SSH client
    steps:
      - Grafana instance
      - Connections -> Private data source connections
      - Open the org's PDC network (one network can serve multiple environments via separate tokens)
      - Configuration Details -> Use a PDC signing token -> Create a new token
      - "Token name: <env>-postgres-YYYYMMDD (the name is just a label; Grafana does not route by token name)"
      - "Copy the value labeled GCLOUD_PDC_SIGNING_TOKEN (begins with glc_); Grafana shows it once"
      - Cluster + hosted-grafana-id are also printed in the same Docker command snippet — capture them in the next two prompts

  - name: GRAFANA_PDC_HOSTED_GRAFANA_ID
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Hosted Grafana ID — stable per Grafana org/instance; copy from the PDC Docker snippet, do not decode the token payload
    steps:
      - Same Configuration Details -> Docker panel that produced the signing token
      - Copy the integer value after -gcloud-hosted-grafana-id
      - This number is stable per Grafana org and is reused across every environment's pdc-agent

  - name: GRAFANA_PDC_CLUSTER
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana PDC cluster — stable per Grafana org region; copy from the PDC Docker snippet
    steps:
      - Same Configuration Details -> Docker panel that produced the signing token
      - "Copy the value after -cluster (e.g. prod-ap-southeast-1)"
      - This value is stable per Grafana org region and is reused across every environment's pdc-agent

  - name: GRAFANA_CLOUD_LOKI_URL
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana Cloud Loki write URL
    url: https://grafana.com/orgs
    steps:
      - Your stack -> Loki
      - "Paste the base URL (e.g. https://logs-prod-020.grafana.net)"
      - /loki/api/v1/push will be appended automatically
    transform: { kind: append-path, path: /loki/api/v1/push }

  - name: GRAFANA_CLOUD_LOKI_USER
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana Cloud Loki numeric user ID
    url: https://grafana.com/orgs
    steps: [Your stack -> Loki, Copy User (numeric)]

  - name: GRAFANA_CLOUD_LOKI_API_KEY
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: "Grafana Cloud API key (logs:write scope)"
    url: https://grafana.com/orgs
    steps:
      - Access Policies -> Create policy
      - "Scope: logs:write"
      - Create token, copy it

  - name: PROMETHEUS_REMOTE_WRITE_URL
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana Cloud Prometheus remote write URL
    url: https://grafana.com/orgs
    steps: [Your stack -> Prometheus, Copy Remote Write URL]

  - name: PROMETHEUS_USERNAME
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: Grafana Cloud Prometheus user (numeric)
    url: https://grafana.com/orgs
    steps: [Your stack -> Prometheus, Copy User (numeric)]

  - name: PROMETHEUS_PASSWORD
    tier: B
    required: false
    category: Observability (Grafana Cloud)
    source: human
    description: "Grafana Cloud API key (metrics:write scope)"
    url: https://grafana.com/orgs
    steps:
      - Access Policies -> Create policy
      - "Scope: metrics:write"
      - Create token, copy it

  # ── D — CI-only ────────────────────────────────────────────────────────
  - name: SSH_DEPLOY_KEY
    tier: D
    required: true
    category: Infrastructure
    source: agent
    perEnv: true
    description: SSH private key for deploy to server
    steps:
      - Auto-generated ed25519 keypair (one per environment)
      - "1. Pubkey pushed to server via existing SSH access"
      - "2. Private key set in GitHub environment secret"
      - "3. Pubkey saved to infra/provision/cherry/base/keys/"
      - "4. Run: tofu apply -var-file=terraform.<env>.tfvars"
    generate: { kind: special-cased-by-main, specialName: SSH_DEPLOY_KEY }

  - name: VM_HOST
    tier: D
    required: true
    category: Infrastructure
    source: human
    perEnv: true
    description: Deploy target IP or hostname
    steps: [The IP address of your Cherry Server VM]

  # ── E — Repo-level (cross-env CI) ─────────────────────────────────────
  - name: CHERRY_AUTH_TOKEN
    tier: E
    required: true
    category: Infrastructure
    source: human
    repoLevel: true
    description: Cherry Servers API token for VM provisioning (tofu apply)
    url: https://portal.cherryservers.com/settings/api-keys
    steps:
      - API Keys page
      - Create or copy existing API key
      - "Also export locally: export CHERRY_AUTH_TOKEN=<value>"

  - name: GHCR_DEPLOY_TOKEN
    tier: E
    required: true
    category: Infrastructure
    source: human
    repoLevel: true
    description: GitHub PAT for docker pull from GHCR on deploy server
    url: https://github.com/settings/tokens?type=beta
    steps:
      - Create fine-grained personal access token
      - "Resource owner: Cogni-DAO"
      - "Permissions:"
      - "  - Packages: Read"

  - name: ACTIONS_AUTOMATION_BOT_PAT
    tier: E
    required: false
    category: CI / Automation
    source: human
    repoLevel: true
    description: GitHub PAT for cross-repo workflow dispatch and release PRs
    url: https://github.com/settings/tokens?type=beta
    steps:
      - Create fine-grained personal access token
      - "Permissions:"
      - "  - Actions: Read and write"
      - "  - Contents: Read and write"
      - "  - Pull requests: Read and write"

  - name: GIT_READ_TOKEN
    tier: E
    required: false
    category: CI / Automation
    source: human
    repoLevel: true
    description: GitHub PAT for git-sync container (repo clone)
    url: https://github.com/settings/tokens?type=beta
    steps:
      - Create fine-grained personal access token
      - "Permissions:"
      - "  - Contents: Read-only"
      - "(Public repos work without token)"

  - name: SONAR_TOKEN
    tier: E
    required: false
    category: CI / Automation
    source: human
    repoLevel: true
    description: SonarCloud analysis token
    url: https://sonarcloud.io/account/security
    steps: [Generate a new token, Copy the full value]

  # ── A2 — service: poly (placeholder until cogni-poly ports its own) ────
  - name: POLYGON_RPC_URL
    tier: A2
    service: poly
    required: true
    category: Polymarket / RPC
    source: human
    description: Polygon mainnet RPC endpoint for poly runtime reads
    url: https://dashboard.alchemy.com/
    steps:
      - "Create a new app (chain: Polygon mainnet)"
      - "Copy the full HTTPS URL including API key"
      - "Used by poly-node for Polygon balances / allowance reads"

  - name: PRIVY_USER_WALLETS_APP_ID
    tier: A2
    service: poly
    required: false
    category: Poly Wallets (Privy)
    source: human
    description: Privy app ID for per-tenant Poly trading wallets
    url: https://dashboard.privy.io
    steps:
      - Open the dedicated user-wallets Privy app
      - Settings -> Basics
      - Copy App ID

  - name: PRIVY_USER_WALLETS_APP_SECRET
    tier: A2
    service: poly
    required: false
    category: Poly Wallets (Privy)
    source: human
    description: Privy app secret for per-tenant Poly trading wallets
    url: https://dashboard.privy.io
    steps:
      - Open the dedicated user-wallets Privy app
      - Settings -> Basics
      - Create or copy App Secret

  - name: PRIVY_USER_WALLETS_SIGNING_KEY
    tier: A2
    service: poly
    required: false
    category: Poly Wallets (Privy)
    source: human
    description: Privy wallet auth key for per-tenant Poly trading wallets
    url: https://dashboard.privy.io
    steps:
      - Open the dedicated user-wallets Privy app
      - Settings -> Authorization
      - Generate or copy signing key
      - "Paste the full wallet-auth:... value"

  - name: POLY_WALLET_AEAD_KEY_HEX
    tier: A2
    service: poly
    required: false
    category: Poly Wallets (Privy)
    source: agent
    description: AES-256-GCM key for encrypting tenant Poly wallet CLOB creds
    steps:
      - "Auto-generated 32-byte hex key"
      - Stored as the at-rest encryption key for poly_wallet_connections ciphertext
    generate: { kind: hex, bytes: 32 }

  - name: POLY_WALLET_AEAD_KEY_ID
    tier: A2
    service: poly
    required: false
    category: Poly Wallets (Privy)
    source: agent
    description: Key-ring label for POLY_WALLET_AEAD_KEY_HEX
    steps:
      - 'Convention: "v1"'
      - Bump only when rotating POLY_WALLET_AEAD_KEY_HEX
    generate: { kind: static, value: v1 }

  # ══════════════════════════════════════════════════════════════════════════
  # A1 — capability-gated node-app baseline (design.secrets-catalog-per-node v2)
  # Migrated from nodes/node-template/.cogni/secrets-catalog.yaml (task.5094).
  # Declared ONCE; the write side fans each to every type:node whose node-spec
  # has the `appliesTo` capability. shared:false (default) = distinct value per
  # node at cogni/<env>/<node>/<KEY>; shared:true = one value at _shared.
  # ⚠️ CLASSIFICATION REVIEW (secrets-owner): capability + shared flags for the
  #    optional web/oauth/observability entries are best-effort; refine as the
  #    node-spec capability set lands. PRIVY_* = payments (custody) is firm.
  # ══════════════════════════════════════════════════════════════════════════

  - name: AUTH_SECRET
    tier: A1
    appliesTo: web
    required: true
    category: Core App
    source: agent
    description: NextAuth session encryption key (per-node — cross-node forgery isolation)
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }
  - name: CONNECTIONS_ENCRYPTION_KEY
    tier: A1
    appliesTo: web
    required: true
    category: Core App
    source: agent
    description: AES key for BYO-AI connection credentials at rest (per-node — cross-node decryption isolation)
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }
  - name: OPENCLAW_GATEWAY_TOKEN
    tier: A1
    appliesTo: openclaw
    coConsumed: true
    required: true
    category: Core App
    source: agent
    description: OpenClaw gateway WS auth token
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }
  - name: INTERNAL_OPS_TOKEN
    tier: A1
    appliesTo: all-nodes
    required: true
    category: Internal Service
    source: agent
    description: Deploy trigger -> governance schedule sync auth
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }
  - name: METRICS_TOKEN
    tier: A1
    appliesTo: all-nodes
    coConsumed: true
    required: true
    category: Internal Service
    source: agent
    description: Prometheus scrape -> /api/metrics auth
    steps: ["Auto-generated random string"]
    generate: { kind: base64, bytes: 32 }
  - name: GH_WEBHOOK_SECRET
    tier: A1
    appliesTo: web
    required: true
    category: Internal Service
    source: agent
    description: GitHub webhook HMAC verification secret
    steps: ["Auto-generated hex string"]
    generate: { kind: hex, bytes: 32 }
  - name: EVM_RPC_URL
    tier: A1
    appliesTo: all-nodes
    shared: true
    required: true
    category: Core App
    source: human
    description: Base mainnet RPC endpoint for on-chain verification
    url: https://dashboard.alchemy.com/
    steps:
      - "Create a new app (chain: Base mainnet)"
      - "Copy the full HTTPS URL including API key"
  - name: TAVILY_API_KEY
    tier: A1
    appliesTo: llm
    shared: true
    required: false
    category: Core App
    source: human
    description: Tavily API key for AI web-search tool (WebSearchCapability)
    url: https://app.tavily.com/home
    steps:
      - Sign in to Tavily and open the API Keys page
      - "Create or copy an existing API key (starts with tvly-)"
  - name: POSTHOG_API_KEY
    tier: A1
    appliesTo: all-nodes
    shared: true
    required: true
    category: Core App
    source: human
    description: PostHog project API key
    url: https://us.posthog.com/settings/project#variables
    steps: ["Copy the Project API Key from project settings"]
  - name: POSTHOG_HOST
    tier: A1
    appliesTo: all-nodes
    shared: true
    required: true
    category: Core App
    source: human
    description: PostHog instance URL
    url: https://us.posthog.com/settings/project#variables
    steps: ['e.g. "https://us.i.posthog.com" for US Cloud']
  - name: DOMAIN
    tier: A1
    appliesTo: all-nodes
    coConsumed: true
    required: true
    category: Infrastructure
    source: human
    perEnv: true
    description: Server domain name (per-node — each node serves its own FQDN)
    steps: ['e.g. "preview.cogni.dev" / "app.cogni.dev"']
  - name: APP_BASE_URL
    tier: A1
    appliesTo: web
    required: true
    category: Infrastructure
    source: agent
    description: Public app origin — used by routes that construct absolute URLs
    steps: ["Auto-derived from DOMAIN at provision time"]
    generate: { kind: derive-env, template: "https://${DOMAIN}" }
  - name: NEXTAUTH_URL
    tier: A1
    appliesTo: web
    required: true
    category: Infrastructure
    source: agent
    description: NextAuth canonical URL — server-side getCsrfToken target; SIWE domain anchor
    steps: ["Auto-derived from DOMAIN at provision time"]
    generate: { kind: derive-env, template: "https://${DOMAIN}" }
  # 🔴 WRITE-SIDE: value is per-node (cogni_<node>), NOT static. The static below
  # is the node-template default only; the fan-out write-side MUST derive
  # cogni_<node> per node (each node has its own DB — canary≠node-template).
  # Changing the generator here today breaks node-template's provision because
  # setup-secrets is not yet per-node-looped (${NODE} unbound). Fixed in the
  # write-side slice alongside the derive-env ${DOMAIN} per-node rebinding.
  # Tracked: task.5094 write-side. Do NOT consume this value for non-node-template
  # nodes until the write-side lands.
  - name: APP_DB_NAME
    tier: A1
    appliesTo: database
    coConsumed: true
    required: true
    category: Database
    source: agent
