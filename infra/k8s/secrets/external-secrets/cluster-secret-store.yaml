#
# ClusterSecretStore — cluster-scoped pointer to the in-cluster OpenBao
# server, consumed by every ExternalSecret regardless of namespace.
# Name `openbao-backend` is the canonical store name per
# docs/spec/secrets-management.md (Consumption pattern).
#
# Auth method: Kubernetes (cluster-issued ServiceAccount JWT). OpenBao
# validates the JWT against the cluster's TokenReview API. The role
# referenced here ("eso-reader") is created in OpenBao + bound to a policy
# that grants read on `cogni/data/<env>/<service>/*` (KV v2 data path) by
# `scripts/setup/provision-env-vm.sh` Phase 5b.3 — fully automated.
#
# RBAC scope: this single role grants read across the cluster's
# ExternalSecrets. Per-service-per-env least-priv is enforced by OpenBao
# path policies (Invariant 6 RBAC_VIA_PATH_POLICY), not by separate
# SecretStores. Multiple ClusterSecretStores would split the role surface
# without strengthening the boundary.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao-backend
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
spec:
  provider:
    vault:
      # In-cluster OpenBao service. TLS disabled in v0 (in-cluster traffic
      # only; cert-manager integration is task.5054).
      server: http://openbao.openbao.svc.cluster.local:8200
      path: cogni
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-reader
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
