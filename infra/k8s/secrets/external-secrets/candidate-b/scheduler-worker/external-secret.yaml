#
# ExternalSecret for scheduler-worker on candidate-b. The OpenBao path uses
# the catalog service name; the k8s Secret name matches the Deployment envFrom
# contract in infra/k8s/base/scheduler-worker/deployment.yaml.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: scheduler-worker-secrets
  namespace: cogni-candidate-b
  labels:
    app.kubernetes.io/part-of: cogni-secrets-substrate
    app.kubernetes.io/component: scheduler-worker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-backend
    kind: ClusterSecretStore
  target:
    name: scheduler-worker-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: candidate-b/scheduler-worker
