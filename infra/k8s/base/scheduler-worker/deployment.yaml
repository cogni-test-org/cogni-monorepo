apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-worker
  labels:
    app.kubernetes.io/name: scheduler-worker
    app.kubernetes.io/part-of: cogni
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scheduler-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler-worker
        app.kubernetes.io/part-of: cogni
    spec:
      terminationGracePeriodSeconds: 30
      # Per QUEUE_PER_NODE_ISOLATION (task.0280 phase 2): the worker runs one
      # Temporal Worker per node in a single pod. Failure of any single node
      # must NOT keep the worker from starting — it would starve every other
      # node's workflow execution, turning isolated data into coupled liveness.
      # Boot readiness is Temporal-reachability only (the sole hard dep).
      # Per-node HTTP reachability is emitted as a boot-time warn log +
      # Prometheus gauge (scheduler_worker_node_reachable), not gated.
      containers:
        - name: scheduler-worker
          image: ghcr.io/cogni-dao/cogni-template:placeholder
          ports:
            - containerPort: 9000
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          envFrom:
            - secretRef:
                name: scheduler-worker-secrets
            - configMapRef:
                name: scheduler-worker-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
