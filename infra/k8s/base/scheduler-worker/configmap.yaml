#
# Non-secret configuration for scheduler-worker.
# Env-specific values (TEMPORAL_NAMESPACE, IMAGE_DIGEST) are patched by overlays.
# COGNI_NODE_ENDPOINTS is identical across envs (same k8s Service DNS), so it lives here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scheduler-worker-config
  labels:
    app.kubernetes.io/name: scheduler-worker
    app.kubernetes.io/part-of: cogni
data:
  # Temporal connection — overridden per-env by overlay
  TEMPORAL_ADDRESS: "temporal:7233"
  TEMPORAL_NAMESPACE: "cogni-staging"
  TEMPORAL_TASK_QUEUE: "scheduler-tasks"
  # Per-node API endpoints — identical across envs (k8s Service DNS + port).
  # Each entry maps nodeId/slug to the node's internal Service.
  COGNI_NODE_ENDPOINTS: "booya=http://booya-node-app:3000,a95e366f-b9cd-4f1d-b02f-9a0da6036a42=http://booya-node-app:3000,canary=http://canary-node-app:3000,89612f02-114d-460d-87a5-c2ab212ccf6f=http://canary-node-app:3000,operator=http://operator-node-app:3000,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://operator-node-app:3000,resy=http://resy-node-app:3000,f6d2a17d-b7f6-4ad1-a86b-f0ad2380999e=http://resy-node-app:3000"
  # Observability
  LOG_LEVEL: "info"
  SERVICE_NAME: "scheduler-worker"
  HEALTH_PORT: "9000"
  # Image digest — set by overlay on promotion
  IMAGE_DIGEST: "placeholder"
