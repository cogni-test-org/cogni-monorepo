#
# Argo CD Application — External Secrets Operator (ESO).
#
# Wraps infra/k8s/argocd/external-secrets/ (kustomize-with-helm) so Argo CD
# reconciles drift on the controller that turns OpenBao reads into native k8s
# Secrets. Mirrors openbao-application.yaml; the two together replace Phase
# 5b.1's imperative kustomize-apply pair.
#
# Sync wave -1: the ESO ExternalSecret + ClusterSecretStore CRDs must reach
# Established before any ExternalSecret CR in the app AppSets (default wave 0)
# is applied — otherwise the AppSet sync fails with "no kind ExternalSecret".
#
# Substitution at apply time (provision-env-vm.sh Phase 5b.1):
#   ${FORK_REPO}     → https://github.com/${GH_REPO}.git
#   ${DEPLOY_BRANCH} → deploy/${DEPLOY_ENV}
#
# SyncPolicy: same shape as openbao-application.yaml.
#   - prune: false. ESO is stateless, but if a future refactor moves these
#     manifests Argo MUST NOT cascade-delete the controller and orphan every
#     ExternalSecret consumer mid-reconciliation. Removal is operator-driven.
#   - selfHeal: true. Drift correction is the refactor's whole point.
#   - ServerSideApply=true. ESO CRDs (clusterexternalsecret, vaultdynamicsecret,
#     ...) trip the client-side annotation size limit.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${FORK_REPO}
    targetRevision: ${DEPLOY_BRANCH}
    path: infra/k8s/argocd/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
