#
# Argo CD non-HA install for single-node k3s with ksops secret decryption.
# Applied during cluster bootstrap, not by Argo itself.
#
# Usage:
#   kubectl create namespace argocd
#   kubectl kustomize infra/k8s/argocd/ | kubectl apply -n argocd -f -
#
# Pin to a specific release for reproducibility:
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  # Pin to Argo CD v2.13 (latest stable as of 2026-03).
  # Non-HA is appropriate for single-node k3s crawl; HA is a P2 concern.
  - https://raw.githubusercontent.com/argoproj/argo-cd/v2.13.4/manifests/install.yaml
  # ksops CMP plugin ConfigMap
  - ksops-cmp.yaml
  # ApplicationSets — one per (env, node) for structural LANE_ISOLATION (axiom 18).
  # candidate-b is provisioned separately (provision-env.yml) and not listed here.
  # >>> GENERATED node-appsets (scripts/ci/render-node-appset.sh) — DO NOT EDIT BY HAND
  - candidate-a-brother-applicationset.yaml
  - candidate-a-canary-applicationset.yaml
  - candidate-a-ihatetesting-applicationset.yaml
  - candidate-a-node-template-applicationset.yaml
  - candidate-a-operator-applicationset.yaml
  - candidate-a-resy-applicationset.yaml
  - candidate-a-scheduler-worker-applicationset.yaml
  - candidate-a-test-cog-applicationset.yaml
  - candidate-a-yo-applicationset.yaml
  - preview-brother-applicationset.yaml
  - preview-canary-applicationset.yaml
  - preview-ihatetesting-applicationset.yaml
  - preview-node-template-applicationset.yaml
  - preview-operator-applicationset.yaml
  - preview-resy-applicationset.yaml
  - preview-scheduler-worker-applicationset.yaml
  - preview-test-cog-applicationset.yaml
  - preview-yo-applicationset.yaml
  - production-brother-applicationset.yaml
  - production-canary-applicationset.yaml
  - production-ihatetesting-applicationset.yaml
  - production-node-template-applicationset.yaml
  - production-operator-applicationset.yaml
  - production-resy-applicationset.yaml
  - production-scheduler-worker-applicationset.yaml
  - production-test-cog-applicationset.yaml
  - production-yo-applicationset.yaml
  # <<< GENERATED node-appsets

patches:
  # Add ksops sidecar to repo-server for SOPS/age secret decryption
  - path: repo-server-patch.yaml
  # 30s reconciliation for fast dev iteration (default is 180s)
  - path: argocd-cm-patch.yaml
