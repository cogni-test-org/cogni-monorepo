#
# Spec: task.5094 candidate-b OpenBao proof.
#
# env-as-formation pilot: a single `list` generator declares which nodes live
# in candidate-b. The template keys only on {{.name}} and keeps a per-node
# deploy branch (targetRevision: deploy/candidate-b-{{.name}}), so per-node
# lane isolation (task.0372) is preserved. Adding/removing a node from this
# env is now a one-line edit. scheduler-worker is a hard-required service in
# every deployment (node-app /readyz depends on it).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-candidate-b
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - list:
        elements:
          - { name: canary }
          - { name: node-template }
          - { name: scheduler-worker }
  template:
    metadata:
      name: "candidate-b-{{.name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni.git
        targetRevision: "deploy/candidate-b-{{.name}}"
        path: "infra/k8s/overlays/candidate-b/{{.name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-candidate-b
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
