# Spec: task.5094 candidate-b OpenBao proof.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cogni-candidate-b
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - git:
        repoURL: https://github.com/cogni-dao/cogni.git
        revision: deploy/candidate-b-node-template
        files:
          - path: "infra/catalog/node-template.yaml"
    - git:
        repoURL: https://github.com/cogni-dao/cogni.git
        revision: deploy/candidate-b-canary
        files:
          - path: "infra/catalog/canary.yaml"
  template:
    metadata:
      name: "candidate-b-{{.name}}"
      namespace: argocd
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/cogni-dao/cogni.git
        targetRevision: "deploy/candidate-b-{{.name}}"
        path: "infra/k8s/overlays/candidate-b/{{.name}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: cogni-candidate-b
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
