apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-production

resources:
  - ../../../base/node-app

namePrefix: resy-

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    newTag: "prod-placeholder-resy"

patches:
  # Node-specific ConfigMap values.
  # DNS names must match prefixed Service names (namePrefix applies to all resources).
  - target:
      kind: ConfigMap
      name: node-app-config
    patch: |
      - op: replace
        path: /data/NODE_NAME
        value: "resy"
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-production"
      - op: replace
        path: /data/LITELLM_BASE_URL
        value: "http://resy-litellm-external:4000"
      - op: replace
        path: /data/TEMPORAL_ADDRESS
        value: "resy-temporal-external:7233"
      - op: replace
        path: /data/REDIS_URL
        value: "redis://resy-redis-external:6379"
      - op: add
        path: /data/NEXTAUTH_URL
        value: "https://resy.cognidao.org"
  # NodePort + instance label on selector (prevents cross-node routing)
  - target:
      kind: Service
      name: node-app
    patch: |
      - op: add
        path: /spec/ports/0/nodePort
        value: 30300
      - op: replace
        path: /spec/ports/0/targetPort
        value: 3300
      - op: add
        path: /spec/selector/app.kubernetes.io~1instance
        value: "resy"
  # Fix secret refs + container port + instance label
  - target:
      kind: Deployment
      name: node-app
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/envFrom/1/secretRef/name
        value: "resy-node-app-secrets"
      - op: replace
        path: /spec/template/spec/initContainers/0/envFrom/1/secretRef/name
        value: "resy-node-app-secrets"
      - op: replace
        path: /spec/template/spec/initContainers/0/envFrom/1/secretRef/name
        value: "resy-node-app-secrets"
      - op: replace
        path: /spec/template/spec/containers/0/ports/0/containerPort
        value: 3300
      - op: add
        path: /spec/selector/matchLabels/app.kubernetes.io~1instance
        value: "resy"
      - op: add
        path: /spec/template/metadata/labels/app.kubernetes.io~1instance
        value: "resy"
  # Migration: skip until node-template builds its own -migrate image (task.0260).

  # bug.0295: VM discovery via DNS (cogni.vm.cognidao.org).
  # Convert base headless Services → ExternalName; delete EndpointSlices.
  - target: { kind: Service, name: postgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres-external
      spec:
        type: ExternalName
        externalName: cogni.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: temporal-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal-external
      spec:
        type: ExternalName
        externalName: cogni.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: litellm-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: litellm-external
      spec:
        type: ExternalName
        externalName: cogni.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: redis-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: redis-external
      spec:
        type: ExternalName
        externalName: cogni.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: doltgres-external }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: doltgres-external
      spec:
        type: ExternalName
        externalName: cogni.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: postgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-external-1
  - target: { kind: EndpointSlice, name: temporal-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-external-1
  - target: { kind: EndpointSlice, name: litellm-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: litellm-external-1
  - target: { kind: EndpointSlice, name: redis-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: redis-external-1
  - target: { kind: EndpointSlice, name: doltgres-external-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: doltgres-external-1
