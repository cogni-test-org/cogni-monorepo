apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cogni-candidate-a

resources:
  - ../../../base/scheduler-worker

images:
  - name: ghcr.io/cogni-dao/cogni-template
    newName: ghcr.io/cogni-dao/cogni-template
    digest: "sha256:ac93215d8b01b76e893c5acf21eb36e223ef5f3ffa925eb8b0b3519704a15303"

patches:
  - target:
      kind: ConfigMap
      name: scheduler-worker-config
    patch: |
      - op: replace
        path: /data/TEMPORAL_NAMESPACE
        value: "cogni-candidate-a"
      - op: replace
        path: /data/IMAGE_DIGEST
        value: "candidate-a-placeholder-scheduler-worker"
      - op: replace
        path: /data/COGNI_NODE_ENDPOINTS
        value: "operator=http://operator-node-app:3000,resy=http://resy-node-app:3000,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://operator-node-app:3000,f6d2a17d-b7f6-4ad1-a86b-f0ad2380999e=http://resy-node-app:3000"

  # bug.0295: VM discovery via DNS (cogni-candidate-a.vm.cognidao.org).
  # Convert base headless Services → ExternalName; delete EndpointSlices.
  - target: { kind: Service, name: temporal }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: temporal
      spec:
        type: ExternalName
        externalName: cogni-candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: postgres }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
      spec:
        type: ExternalName
        externalName: cogni-candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: app }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: app
      spec:
        type: ExternalName
        externalName: cogni-candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: Service, name: poly-app }
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Service
      metadata:
        name: poly-app
  - target: { kind: Service, name: resy-app }
    patch: |
      apiVersion: v1
      kind: Service
      metadata:
        name: resy-app
      spec:
        type: ExternalName
        externalName: cogni-candidate-a.vm.cognidao.org
        clusterIP: null
  - target: { kind: EndpointSlice, name: temporal-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: temporal-1
  - target: { kind: EndpointSlice, name: postgres-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: postgres-1
  - target: { kind: EndpointSlice, name: app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: app-1
  - target: { kind: EndpointSlice, name: poly-app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: poly-app-1
  - target: { kind: EndpointSlice, name: resy-app-1 }
    patch: |
      $patch: delete
      apiVersion: discovery.k8s.io/v1
      kind: EndpointSlice
      metadata:
        name: resy-app-1
