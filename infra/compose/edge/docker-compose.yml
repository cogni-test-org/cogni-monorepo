# Cogni Edge Stack
# Always-on TLS termination layer. Isolated from app deployments to prevent
# connection resets during deploys. Started once at bootstrap, rarely touched.
#
# INVARIANTS:
# - Never `docker compose down` this stack during app deployments
# - Only restart on Caddyfile changes or cert issues
# - Shares `cogni-edge` network with app stack for service DNS resolution

services:
  caddy:
    image: caddy:2
    restart: always
    networks:
      - cogni-edge
    ports:
      - "80:80"
      - "443:443"
    # Allow Caddy to reach k3s NodePorts on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DOMAIN=${DOMAIN}
      - POLY_DOMAIN=${POLY_DOMAIN:-}
      - RESY_DOMAIN=${RESY_DOMAIN:-}
      - NODE_TEMPLATE_DOMAIN=${NODE_TEMPLATE_DOMAIN:-}
      # Per-node upstreams. Default to Docker DNS (CI/dev); override to
      # host.docker.internal:<nodeport> for k3s edge deploys.
      - OPERATOR_UPSTREAM=${OPERATOR_UPSTREAM:-app:3000}
      - POLY_UPSTREAM=${POLY_UPSTREAM:-poly:3100}
      - RESY_UPSTREAM=${RESY_UPSTREAM:-resy:3300}
      - NODE_TEMPLATE_UPSTREAM=${NODE_TEMPLATE_UPSTREAM:-node-template:3200}
    volumes:
      - ./configs/Caddyfile.tmpl:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cogni-edge:
    name: cogni-edge
    external: true

volumes:
  caddy_data:
    name: cogni-edge_caddy_data
  caddy_config:
    name: cogni-edge_caddy_config
