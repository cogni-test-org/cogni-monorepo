# Cogni Edge Stack
# Always-on TLS termination layer. Isolated from app deployments to prevent
# connection resets during deploys. Started once at bootstrap, rarely touched.
#
# INVARIANTS:
# - Never `docker compose down` this stack during app deployments
# - Only restart on Caddyfile changes or cert issues
# - Shares `cogni-edge` network with app stack for service DNS resolution

services:
  caddy:
    image: caddy:2
    restart: always
    networks:
      - cogni-edge
    ports:
      - "80:80"
      - "443:443"
    # Allow Caddy to reach k3s NodePorts on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # task.5078 — per-node edge routing is catalog-driven. deploy-infra.sh /
    # provision-env-vm.sh write one `<SLUG>_DOMAIN` per type:node into this .env
    # (looping NODE_TARGETS); env_file passes them all into Caddy so adding a node
    # needs no edit here. Upstream ports are baked into the generated Caddyfile
    # from catalog node_port; the operator-primary upstream comes from the .env
    # file in deploys and falls back inside the Caddyfile for local dev.
    # required:false keeps `docker:edge:up` working before any .env exists.
    env_file:
      - path: .env
        required: false
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./configs/Caddyfile.tmpl:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:2019/config/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  cogni-edge:
    name: cogni-edge
    external: true

volumes:
  caddy_data:
    name: cogni-edge_caddy_data
  caddy_config:
    name: cogni-edge_caddy_config
