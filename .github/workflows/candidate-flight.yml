name: Candidate Flight

# Spec: work/items/task.0372 (per-node lane isolation, matrix fan-out).

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to flight"
        required: false
        type: string
      head_sha:
        description: "Optional PR head SHA override"
        required: false
        type: string
      node_slug:
        description: "Submodule node slug for node-ref flight"
        required: false
        type: string
      source_sha:
        description: "Child node repo source SHA for node-ref flight"
        required: false
        type: string

permissions:
  contents: write
  packages: read
  pull-requests: read
  statuses: write

concurrency:
  group: candidate-flight-${{ inputs.pr_number || format('{0}-{1}', inputs.node_slug, inputs.source_sha) }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cogni-template
  SLOT: candidate-a
  OVERLAY_ENV: candidate-a

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.meta.outputs.head_sha }}
      node_slug: ${{ steps.meta.outputs.node_slug }}
      node_source_sha: ${{ steps.meta.outputs.node_source_sha }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      status_url: ${{ steps.meta.outputs.status_url }}
      digests_json: ${{ steps.images.outputs.digests_json }}
      targets_json: ${{ steps.detect.outputs.targets_json }}
      has_targets: ${{ steps.detect.outputs.has_targets }}
      flight_targets_json: ${{ steps.flight-targets.outputs.flight_targets_json }}
      has_flight_targets: ${{ steps.flight-targets.outputs.has_flight_targets }}
      has_image_inputs: ${{ steps.flight-targets.outputs.has_image_inputs }}
      needs_substrate_check: ${{ steps.substrate.outputs.needs_substrate_check }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0

      - name: Resolve PR metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ inputs.pr_number }}"
          NODE_SLUG="${{ inputs.node_slug }}"
          NODE_SOURCE_SHA="${{ inputs.source_sha }}"
          if [ -n "$NODE_SLUG" ] || [ -n "$NODE_SOURCE_SHA" ]; then
            if [ -n "$PR_NUMBER" ]; then
              echo "::error::candidate-flight accepts either pr_number or node_slug/source_sha, not both"
              exit 1
            fi
            if [ -z "$NODE_SLUG" ] || [ -z "$NODE_SOURCE_SHA" ]; then
              echo "::error::node-ref flight requires both node_slug and source_sha"
              exit 1
            fi
            if ! [[ "$NODE_SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::source_sha must be a 40-char hex SHA"
              exit 1
            fi
            BASE_REF=main
            HEAD_SHA="${{ github.sha }}"
            IMAGE_TAG="sha-${NODE_SOURCE_SHA}"
          else
            if [ -z "$PR_NUMBER" ]; then
              echo "::error::candidate-flight requires pr_number or node_slug/source_sha"
              exit 1
            fi
            BASE_REF=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.base.ref')
            HEAD_SHA_INPUT="${{ inputs.head_sha }}"
            if [ -n "$HEAD_SHA_INPUT" ]; then
              HEAD_SHA="$HEAD_SHA_INPUT"
            else
              HEAD_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.sha')
            fi
            IMAGE_TAG="pr-${PR_NUMBER}-${HEAD_SHA}"
          fi
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "node_slug=$NODE_SLUG" >> "$GITHUB_OUTPUT"
          echo "node_source_sha=$NODE_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "status_url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_OUTPUT"

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ steps.meta.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Report pending candidate-flight status
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ steps.meta.outputs.head_sha }}
          STATE: pending
          DESCRIPTION: Candidate flight in progress
          TARGET_URL: ${{ steps.meta.outputs.status_url }}
        run: bash scripts/ci/report-candidate-status.sh

      # Use the GitHub PR `files` API (same list as the Files Changed tab)
      # as the authoritative changed-paths source. `git diff origin/main...HEAD`
      # is unreliable here: when a branch is forked from a sibling branch
      # that later gets squash-merged into main, the original commits stay
      # reachable from HEAD and pollute the merge-base diff with paths the
      # PR never actually changed.
      - name: Fetch PR changed-paths from GitHub API
        id: pr-files
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          OUT: ${{ runner.temp }}/pr-changed-paths.txt
          NODE_SLUG: ${{ steps.meta.outputs.node_slug }}
        run: |
          set -euo pipefail
          if [ -n "$NODE_SLUG" ]; then
            : > "$OUT"
            : > "${OUT%.txt}-added.txt"
            echo "ℹ️  Node-ref flight for ${NODE_SLUG}; PR changed-paths are not used"
            echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"
            echo "added_paths_file=${OUT%.txt}-added.txt" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Emit both filename and previous_filename so cross-directory
          # renames trigger rebuilds for the source side too (otherwise
          # renaming nodes/A/x.ts → nodes/B/x.ts only rebuilds B).
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | (.filename, .previous_filename) | select(. != null)' > "$OUT"
          gh api --paginate "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | select(.status == "added") | .filename' > "${OUT%.txt}-added.txt"
          COUNT=$(wc -l < "$OUT" | tr -d ' ')
          echo "ℹ️  PR #${PR_NUMBER} changed ${COUNT} path(s) (per GitHub API)"
          echo "changed_paths_file=$OUT" >> "$GITHUB_OUTPUT"
          echo "added_paths_file=${OUT%.txt}-added.txt" >> "$GITHUB_OUTPUT"

      - name: Detect affected nodes
        id: detect
        working-directory: app-src
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
        run: bash scripts/ci/detect-affected.sh

      - name: Detect remote-source artifact targets
        id: remote-source-artifact-targets
        working-directory: app-src
        env:
          CHANGED_PATHS_FILE: ${{ steps.pr-files.outputs.changed_paths_file }}
          COGNI_CATALOG_ROOT: infra/catalog
          OUTPUT_FILE: ${{ runner.temp }}/remote-source-artifact-targets.json
        run: bash ../scripts/ci/detect-remote-source-artifact-targets.sh

      - name: Combine flight targets
        id: flight-targets
        env:
          NORMAL_FLIGHT_TARGETS_JSON: ${{ steps.detect.outputs.flight_targets_json }}
          REMOTE_SOURCE_ARTIFACT_TARGETS_JSON: ${{ steps.remote-source-artifact-targets.outputs.remote_source_artifact_targets_json }}
          HAS_PARENT_TARGETS: ${{ steps.detect.outputs.has_targets }}
          HAS_REMOTE_SOURCE_ARTIFACT_TARGETS: ${{ steps.remote-source-artifact-targets.outputs.has_remote_source_artifact_targets }}
          NODE_SLUG: ${{ steps.meta.outputs.node_slug }}
        run: |
          set -euo pipefail
          if [ -n "$NODE_SLUG" ]; then
            combined=$(python3 -c 'import json, os; print(json.dumps([os.environ["NODE_SLUG"]]))')
          else
            combined=$(python3 -c 'import json, os; items = json.loads(os.environ["NORMAL_FLIGHT_TARGETS_JSON"] or "[]") + json.loads(os.environ["REMOTE_SOURCE_ARTIFACT_TARGETS_JSON"] or "[]"); out = []; seen = set(); [out.append(item) or seen.add(item) for item in items if item not in seen]; print(json.dumps(out))')
          fi
          csv=$(python3 -c 'import json, sys; print(",".join(json.loads(sys.argv[1])))' "$combined")
          has_flight_targets=false
          [ "$combined" != "[]" ] && has_flight_targets=true
          has_image_inputs=false
          if [ -n "$NODE_SLUG" ] || [ "$HAS_PARENT_TARGETS" = "true" ] || [ "$HAS_REMOTE_SOURCE_ARTIFACT_TARGETS" = "true" ]; then
            has_image_inputs=true
          fi
          echo "flight_targets_json=$combined" >> "$GITHUB_OUTPUT"
          echo "flight_targets=$csv" >> "$GITHUB_OUTPUT"
          echo "has_flight_targets=$has_flight_targets" >> "$GITHUB_OUTPUT"
          echo "has_image_inputs=$has_image_inputs" >> "$GITHUB_OUTPUT"

      # Node-ref and catalog-birth flights are app flights. They must not run
      # hidden infra provisioning; they assert the target substrate that
      # provision-env / candidate-flight-infra owns already exists, then promote
      # only the app digest. This workflow currently enables the gate only for
      # type=node targets.
      - name: Detect substrate assertion need
        id: substrate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          NODE_SLUG: ${{ steps.meta.outputs.node_slug }}
        run: |
          set -euo pipefail
          if [ -n "$NODE_SLUG" ]; then
            echo "::notice::Node-ref flight for ${NODE_SLUG} — asserting candidate-a substrate before app flight"
            echo "needs_substrate_check=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ADDED_CATALOG=$(gh api --paginate \
            "repos/${{ github.repository }}/pulls/${PR_NUMBER}/files" \
            --jq '.[] | select(.status == "added") | .filename
                  | select(test("^infra/catalog/[^/]+\\.yaml$"))')
          ADDED_NODE_CATALOG=""
          while IFS= read -r catalog_path; do
            [ -n "$catalog_path" ] || continue
            catalog_type=$(yq -N '.type // ""' "app-src/${catalog_path}")
            if [ "$catalog_type" = "node" ]; then
              ADDED_NODE_CATALOG+="${catalog_path}"$'\n'
            else
              echo "::notice::Added ${catalog_type:-unknown} catalog entry ${catalog_path} does not use app-flight substrate assertion in this workflow"
            fi
          done <<< "$ADDED_CATALOG"
          if [ -n "$ADDED_NODE_CATALOG" ]; then
            echo "::notice::Node birth detected — asserting target substrate for new node catalog entry: ${ADDED_NODE_CATALOG//$'\n'/ }"
            echo "needs_substrate_check=true" >> "$GITHUB_OUTPUT"
          else
            echo "ℹ️  No added node catalog entry — app-only flight, infra independent"
            echo "needs_substrate_check=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.flight-targets.outputs.has_image_inputs == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.flight-targets.outputs.has_image_inputs == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_DEPLOY_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_DEPLOY_TOKEN || github.token }}

      - name: Resolve PR image digests
        id: images
        if: steps.flight-targets.outputs.has_image_inputs == 'true'
        working-directory: app-src
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          SOURCE_SHA: ${{ steps.meta.outputs.head_sha }}
          NODE: ${{ steps.meta.outputs.node_slug }}
          NODE_SOURCE_SHA: ${{ steps.meta.outputs.node_source_sha }}
          COGNI_CATALOG_ROOT: infra/catalog
          REMOTE_SOURCE_ARTIFACT_TARGETS_FILE: ${{ steps.remote-source-artifact-targets.outputs.targets_file }}
          OUTPUT_FILE: ${{ runner.temp }}/resolved-pr-images.json
        run: |
          set -euo pipefail
          if [ -n "$NODE" ]; then
            SOURCE_SHA="$NODE_SOURCE_SHA" bash ../scripts/ci/resolve-node-ref-image.sh
          else
            bash ../scripts/ci/resolve-pr-build-images.sh
          fi

      - name: Require at least one built image
        if: steps.flight-targets.outputs.has_image_inputs == 'true' && steps.images.outputs.has_images != 'true'
        run: |
          echo "::error::No deployable artifact images found for ${{ steps.meta.outputs.image_tag }}"
          exit 1

      - name: Upload resolved-pr-images artifact
        if: steps.flight-targets.outputs.has_image_inputs == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: resolved-pr-images
          path: ${{ runner.temp }}/resolved-pr-images.json
          retention-days: 1

  reconcile-appset:
    needs: decide
    if: needs.decide.outputs.has_flight_targets == 'true'
    # Per-node lane (axiom 18, LANE_ISOLATION). A flight applies ONLY its own
    # node's ApplicationSet object — never a shared file carrying other lanes'
    # generators — so a concurrent flight of a different node cannot prune this
    # node's Application. This is the structural fix for the shared-appset
    # clobber: see work/items/bug.0378.reconcile-appset-shared-write-race.md.
    # Matrix tracks the FLIGHT targets (the nodes actually deploying), in lockstep
    # with the flight job below.
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(needs.decide.outputs.flight_targets_json) }}
    concurrency:
      group: reconcile-appset-candidate-a-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source (for AppSet YAML)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          NODE_SOURCE_SHA: ${{ needs.decide.outputs.node_source_sha }}
          DEPLOY_ENVIRONMENT: candidate-a
        run: |
          bash ci-src/scripts/ci/require-node-ref-vm.sh
          if [ "$VM_HOST" = "" ]; then
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Apply candidate-a-${{ matrix.node }}-applicationset.yaml
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          NODE: ${{ matrix.node }}
        run: |
          set -euo pipefail
          # shellcheck source=ci-src/scripts/ci/lib/ssh-retry.sh
          . ci-src/scripts/ci/lib/ssh-retry.sh
          APPSET_FILE="app-src/infra/k8s/argocd/candidate-a-${NODE}-applicationset.yaml"
          if [ ! -f "$APPSET_FILE" ]; then
            echo "::error::$APPSET_FILE missing at head_sha — run 'pnpm gen:node-appset' (CATALOG_IS_SSOT)"
            exit 1
          fi
          read -r -a ssh_opts <<< "$SSH_OPTS"
          ci_ssh_retry scp "${ssh_opts[@]}" "$APPSET_FILE" "root@${VM_HOST}:/tmp/appset-${NODE}.yaml"
          # Anti-resurrection: the legacy shared `cogni-candidate-a` AppSet is
          # retired. Orphan-delete (never prune its live Applications) so it can
          # never reappear to re-clobber this lane, then apply the per-node object.
          ci_ssh_retry ssh "${ssh_opts[@]}" "root@${VM_HOST}" "kubectl delete applicationset cogni-candidate-a -n argocd --cascade=orphan --ignore-not-found && kubectl apply -f /tmp/appset-${NODE}.yaml -n argocd && rm -f /tmp/appset-${NODE}.yaml"

  assert-substrate:
    needs: [decide, reconcile-appset, reconcile-dns]
    if: |
      always() &&
      needs.decide.outputs.needs_substrate_check == 'true' &&
      needs.reconcile-appset.result == 'success' &&
      needs.reconcile-dns.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(needs.decide.outputs.flight_targets_json) }}
    concurrency:
      group: assert-substrate-candidate-a-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Setup SSH to candidate-a VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          NODE_SOURCE_SHA: ${{ needs.decide.outputs.node_source_sha }}
          DEPLOY_ENVIRONMENT: candidate-a
        run: |
          set -euo pipefail
          bash ci-src/scripts/ci/require-node-ref-vm.sh
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Assert target substrate
        env:
          TARGET: ${{ matrix.node }}
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: candidate-a
          DOMAIN: ${{ vars.DOMAIN }}
          FORK_DOMAIN_ROOT: ${{ vars.FORK_DOMAIN_ROOT || 'cognidao.org' }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          APP_SOURCE_DIR: app-src
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/assert-target-substrate.sh

  flight:
    needs: [decide, reconcile-appset, assert-substrate]
    if: |
      always() &&
      needs.decide.outputs.has_flight_targets == 'true' &&
      needs.reconcile-appset.result == 'success' &&
      (
        (needs.decide.outputs.needs_substrate_check == 'true' && needs.assert-substrate.result == 'success') ||
        (needs.decide.outputs.needs_substrate_check != 'true' && needs.assert-substrate.result == 'skipped')
      )
    strategy:
      fail-fast: false
      matrix:
        env: [candidate-a]
        node: ${{ fromJson(needs.decide.outputs.flight_targets_json) }}
    concurrency:
      group: candidate-flight-pipeline-${{ matrix.env }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    outputs:
      head_sha: ${{ needs.decide.outputs.head_sha }}
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 0
          path: app-src

      - name: Download resolved-pr-images
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: resolved-pr-images
          path: ${{ runner.temp }}/

      - name: Prepare per-node deploy branch workspace
        env:
          GH_TOKEN: ${{ github.token }}
          PER_NODE_BRANCH: deploy/${{ matrix.env }}-${{ matrix.node }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          git fetch origin "+refs/heads/deploy/*:refs/remotes/origin/deploy/*"
          if git rev-parse --verify --quiet "refs/remotes/origin/${PER_NODE_BRANCH}" >/dev/null; then
            git checkout -B "${PER_NODE_BRANCH}" "origin/${PER_NODE_BRANCH}"
          else
            echo "::warning::Per-node branch ${PER_NODE_BRANCH} missing — bootstrapping from deploy/${{ matrix.env }}"
            git fetch origin "deploy/${{ matrix.env }}"
            git checkout -B "${PER_NODE_BRANCH}" "origin/deploy/${{ matrix.env }}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Snapshot deploy-branch overlay digests (pre-rsync)
        id: snapshot
        working-directory: deploy-branch
        env:
          OVERLAY_ENV: candidate-a
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          bash ../ci-src/scripts/ci/snapshot-overlay-digests.sh > "$SNAPSHOT_FILE"
          echo "ℹ️  Pre-rsync overlay snapshot ($(wc -l < "$SNAPSHOT_FILE" | tr -d ' ') rows):"
          sed 's/^/  /' "$SNAPSHOT_FILE"

      - name: Sync base + per-node overlay + per-node catalog to deploy branch
        env:
          NODE: ${{ matrix.node }}
        run: |
          set -euo pipefail
          rsync -a --delete app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          mkdir -p "deploy-branch/infra/k8s/overlays/candidate-a/${NODE}"
          rsync -a --delete \
            "app-src/infra/k8s/overlays/candidate-a/${NODE}/" \
            "deploy-branch/infra/k8s/overlays/candidate-a/${NODE}/"
          mkdir -p deploy-branch/infra/catalog
          cp "app-src/infra/catalog/${NODE}.yaml" "deploy-branch/infra/catalog/${NODE}.yaml"
          if [ -d "app-src/nodes/${NODE}/k8s/external-secrets/candidate-a" ]; then
            mkdir -p "deploy-branch/nodes/${NODE}/k8s/external-secrets/candidate-a"
            rsync -a --delete \
              "app-src/nodes/${NODE}/k8s/external-secrets/candidate-a/" \
              "deploy-branch/nodes/${NODE}/k8s/external-secrets/candidate-a/"
          fi

      - name: Promote this node's digest
        id: promote
        working-directory: deploy-branch
        env:
          PAYLOAD_FILE: ${{ runner.temp }}/resolved-pr-images.json
          OVERLAY_ENV: candidate-a
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
          COGNI_CATALOG_ROOT: ../app-src/infra/catalog
        run: NODES="$NODE" bash ../ci-src/scripts/ci/promote-build-payload.sh

      - name: Restore non-promoted overlay digests (post-rsync self-heal)
        working-directory: deploy-branch
        env:
          PROMOTED_APPS: ${{ steps.promote.outputs.promoted_apps }}
          SNAPSHOT_FILE: ${{ runner.temp }}/candidate-a-overlay-snapshot.tsv
        run: |
          set -euo pipefail
          if [ ! -s "$SNAPSHOT_FILE" ]; then
            echo "ℹ️  No snapshot rows (cold-start) — nothing to restore"
            exit 0
          fi
          # shellcheck source=../ci-src/scripts/ci/lib/image-tags.sh
          . ../ci-src/scripts/ci/lib/image-tags.sh
          declare -A snap=()
          while IFS=$'\t' read -r app ref; do
            [ -n "$app" ] && snap["$app"]="$ref"
          done < "$SNAPSHOT_FILE"
          promoted_padded=" $(echo "$PROMOTED_APPS" | tr ',' ' ' | tr -s ' ') "
          for target in "${ALL_TARGETS[@]}"; do
            if [[ "$promoted_padded" == *" $target "* ]]; then
              continue
            fi
            ref="${snap[$target]:-}"
            [ -z "$ref" ] && continue
            [[ "$ref" != *"@sha256:"* ]] && continue
            bash ../ci-src/scripts/ci/promote-k8s-image.sh --no-commit \
              --env candidate-a --app "$target" --digest "$ref"
          done

      - name: Commit and push to per-node deploy branch
        id: push-deploy
        working-directory: deploy-branch
        env:
          PER_NODE_BRANCH: deploy/${{ matrix.env }}-${{ matrix.node }}
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No deploy-state changes to push"
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ needs.decide.outputs.node_source_sha }}" ]; then
            git commit -m "candidate-flight ${NODE}: node-ref ${{ needs.decide.outputs.node_source_sha }}"
          else
            git commit -m "candidate-flight ${NODE}: pr-${{ inputs.pr_number }} ${HEAD_SHA}"
          fi
          git push origin "HEAD:${PER_NODE_BRANCH}"
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      # GHA matrix-job outputs collapse to the last cell's value; per-node
      # artifact is the per-cell contract verify-candidate reads.
      - name: Upload per-cell deploy_branch_sha artifact
        if: always()
        env:
          NODE: ${{ matrix.node }}
          DEPLOY_SHA: ${{ steps.push-deploy.outputs.deploy_branch_sha }}
        run: |
          mkdir -p deploy-sha-out
          printf '%s' "${DEPLOY_SHA:-}" > "deploy-sha-out/deploy-sha-${NODE}.txt"
      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: deploy-sha-${{ matrix.node }}
          path: deploy-sha-out/deploy-sha-${{ matrix.node }}.txt
          retention-days: 1

  # Per-node public DNS. The node's overlay/secrets/DB all auto-fan on flight,
  # but `<node>-test.<root>` only resolved if someone hand-made a Cloudflare A
  # record (no `*-test` wildcard) — so a freshly-created node deployed but its
  # public URL failed at DNS. This reconciles one A record per non-primary
  # catalog node → the env VM IP (idempotent), so verify-candidate's smoke +
  # buildSha checks (which curl host_for_node(node, DOMAIN)) resolve.
  #
  # Depends only on `decide` (DNS is env-level, independent of the image build):
  # it runs on EVERY flight dispatch — including no-target ones — so it both
  # self-heals every node's record and is independently exercisable/validatable
  # without a node change. Idempotent + mirrors the apex proxy state, so a
  # no-op run is the proof the live write path is green.
  reconcile-dns:
    needs: [decide]
    if: needs.decide.result == 'success'
    # Serialize Cloudflare writes across concurrent flights (mirrors reconcile-appset).
    concurrency:
      group: reconcile-dns-candidate-a
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      # Workflow source at the root owns local composite actions + shared CI
      # helpers, so telemetry remains available even when the PR-head app source
      # predates .github/actions/loki-push.
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      # PR head, not the workflow default branch: a PR that ADDS a node carries
      # the new catalog entry + the reconcile script here, so DNS covers it.
      - name: Checkout app source (PR catalog + scripts)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Reconcile node DNS (per-node A records → VM IP)
        working-directory: app-src
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          FORK_DOMAIN_ROOT: ${{ vars.FORK_DOMAIN_ROOT || 'cognidao.org' }}
          DOMAIN: ${{ vars.DOMAIN }}
          DNS_RECONCILE_SUMMARY_FILE: ${{ runner.temp }}/dns-reconcile-summary.json
          DNS_RECONCILE_CANDIDATE_SHA: ${{ needs.decide.outputs.node_source_sha || needs.decide.outputs.head_sha }}
          DNS_RECONCILE_HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
          DNS_RECONCILE_NODE_SOURCE_SHA: ${{ needs.decide.outputs.node_source_sha }}
          DNS_RECONCILE_PR_NUMBER: ${{ inputs.pr_number }}
          DNS_RECONCILE_NODE_SLUG: ${{ needs.decide.outputs.node_slug }}
          DNS_RECONCILE_STATUS_URL: ${{ needs.decide.outputs.status_url }}
        run: |
          set -euo pipefail
          write_skip_summary() {
            local reason="$1"
            local candidate_sha8="${DNS_RECONCILE_CANDIDATE_SHA:0:8}"
            jq -nc \
              --arg status "skipped" \
              --arg reason "$reason" \
              --arg deploy_env "candidate-a" \
              --arg domain "${DOMAIN:-}" \
              --arg workflow "${GITHUB_WORKFLOW:-}" \
              --arg job "${GITHUB_JOB:-}" \
              --arg run_id "${GITHUB_RUN_ID:-}" \
              --arg attempt "${GITHUB_RUN_ATTEMPT:-}" \
              --arg ref "${GITHUB_REF_NAME:-}" \
              --arg workflow_sha "${GITHUB_SHA:-}" \
              --arg candidate_sha "${DNS_RECONCILE_CANDIDATE_SHA:-}" \
              --arg candidate_sha8 "$candidate_sha8" \
              --arg head_sha "${DNS_RECONCILE_HEAD_SHA:-}" \
              --arg node_source_sha "${DNS_RECONCILE_NODE_SOURCE_SHA:-}" \
              --arg pr_number "${DNS_RECONCILE_PR_NUMBER:-}" \
              --arg node_slug "${DNS_RECONCILE_NODE_SLUG:-}" \
              --arg status_url "${DNS_RECONCILE_STATUS_URL:-}" \
              --arg emitted_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{schema_version: 1, type: "dns_reconcile_summary", status: $status, skip_reason: $reason, deploy_env: $deploy_env, domain: $domain, workflow: $workflow, job: $job, run_id: $run_id, attempt: $attempt, ref: $ref, workflow_sha: $workflow_sha, candidate_sha: $candidate_sha, candidate_sha8: $candidate_sha8, head_sha: $head_sha, node_source_sha: $node_source_sha, pr_number: $pr_number, node_slug: $node_slug, status_url: $status_url, record_count: 0, states: {}, records: [], emitted_at: $emitted_at}' \
              > "$DNS_RECONCILE_SUMMARY_FILE"
          }
          # Flights run on a main-merge ref; a pre-#1445 head lacks this script.
          # Skip rather than 127 so older PRs still flight (their nodes already resolve).
          if [ ! -f scripts/ci/reconcile-node-dns.sh ]; then
            echo "::warning::scripts/ci/reconcile-node-dns.sh absent at this ref — skipping node DNS reconcile"
            write_skip_summary "script_absent"
            exit 0
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
            echo "::warning::Cloudflare secrets unset on candidate-a — skipping node DNS reconcile (newly-created nodes won't resolve)"
            write_skip_summary "cloudflare_secrets_missing"
            exit 0
          fi
          bash scripts/ci/reconcile-node-dns.sh candidate-a

      - name: Push DNS reconcile telemetry to Loki
        if: always()
        uses: ./.github/actions/loki-push
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          log_file: ${{ runner.temp }}/dns-reconcile-summary.json
          job_name: reconcile-dns
          labels: workflow=candidate-flight kind=dns_reconcile slot=candidate-a

  verify-candidate:
    needs: [decide, flight, reconcile-dns, assert-substrate]
    if: |
      always() &&
      needs.decide.outputs.has_flight_targets == 'true' &&
      needs.flight.result == 'success' &&
      needs.reconcile-dns.result == 'success' &&
      (
        (needs.decide.outputs.needs_substrate_check == 'true' && needs.assert-substrate.result == 'success') ||
        (needs.decide.outputs.needs_substrate_check != 'true' && needs.assert-substrate.result == 'skipped')
      )
    strategy:
      fail-fast: false
      matrix:
        env: [candidate-a]
        node: ${{ fromJson(needs.decide.outputs.flight_targets_json) }}
    concurrency:
      group: candidate-flight-pipeline-${{ matrix.env }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: candidate-a
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          path: ci-src

      - name: Checkout app source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Checkout per-node deploy branch (for source-sha map)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: deploy/${{ matrix.env }}-${{ matrix.node }}
          path: deploy-branch
          token: ${{ github.token }}

      - name: Download per-cell deploy_branch_sha
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: deploy-sha-${{ matrix.node }}
          path: ${{ runner.temp }}/

      - name: Resolve EXPECTED_SHA
        id: expected
        env:
          ARTIFACT_FILE: ${{ runner.temp }}/deploy-sha-${{ matrix.node }}.txt
        run: |
          set -euo pipefail
          DEPLOY_SHA=$(cat "$ARTIFACT_FILE" 2>/dev/null || true)
          if [ -z "$DEPLOY_SHA" ]; then
            echo "::error::Per-cell deploy_branch_sha artifact empty for ${{ matrix.node }}"
            exit 1
          fi
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Setup SSH to candidate-a VM
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          NODE_SOURCE_SHA: ${{ needs.decide.outputs.node_source_sha }}
          DEPLOY_ENVIRONMENT: candidate-a
        run: |
          set -euo pipefail
          bash ci-src/scripts/ci/require-node-ref-vm.sh
          if [ "$VM_HOST" = "" ]; then
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for ArgoCD sync (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: candidate-a
          EXPECTED_SHA: ${{ steps.expected.outputs.deploy_branch_sha }}
          PROMOTED_APPS: ${{ matrix.node }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/wait-for-argocd.sh

      - name: Wait for candidate readiness
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          PROMOTED_APPS: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/wait-for-candidate-ready.sh

      - name: Wait for in-cluster services (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          DEPLOY_ENVIRONMENT: candidate-a
          PROMOTED_APPS: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/wait-for-in-cluster-services.sh

      - name: Run candidate smoke checks (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          PROMOTED_APPS: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/smoke-candidate.sh

      - name: Verify buildSha on endpoint (per-node)
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          SOURCE_SHA_MAP: deploy-branch/.promote-state/source-sha-by-app.json
          EXPECTED_BUILDSHA: ${{ needs.decide.outputs.node_source_sha || needs.decide.outputs.head_sha }}
          NODES: ${{ matrix.node }}
          COGNI_CATALOG_ROOT: app-src/infra/catalog
        run: bash ci-src/scripts/ci/verify-buildsha.sh

  report-status:
    needs: [decide, flight, verify-candidate]
    if: always() && needs.decide.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Decide aggregate state
        id: decide
        env:
          HAS_TARGETS: ${{ needs.decide.outputs.has_targets }}
          HAS_FLIGHT_TARGETS: ${{ needs.decide.outputs.has_flight_targets }}
          FLIGHT_RESULT: ${{ needs.flight.result }}
          VERIFY_RESULT: ${{ needs.verify-candidate.result }}
          TARGETS_JSON: ${{ needs.decide.outputs.flight_targets_json }}
        run: |
          set -euo pipefail
          echo "has_targets=${HAS_TARGETS} has_flight_targets=${HAS_FLIGHT_TARGETS} flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT} flight_targets=${TARGETS_JSON}"
          if [ "$HAS_FLIGHT_TARGETS" != "true" ]; then
            # No k8s app-lever targets. Either nothing affected, or the affected
            # set is type:infra only (e.g. litellm) — which deploys via the
            # explicit Compose infra workflow, not this app lever.
            STATE=success
            if [ "$HAS_TARGETS" = "true" ]; then
              DESC="Candidate flight no-op (infra-only affected set; deploys via Compose lever)"
            else
              DESC="Candidate flight no-op (no affected nodes)"
            fi
          elif [ "$FLIGHT_RESULT" = "success" ] && [ "$VERIFY_RESULT" = "success" ]; then
            STATE=success
            DESC="Candidate flight passed (matrix: ${TARGETS_JSON})"
          elif [ "$FLIGHT_RESULT" = "failure" ] || [ "$VERIFY_RESULT" = "failure" ]; then
            STATE=failure
            DESC="Candidate flight failed (flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT})"
          elif [ "$FLIGHT_RESULT" = "cancelled" ] || [ "$VERIFY_RESULT" = "cancelled" ]; then
            STATE=failure
            DESC="Candidate flight cancelled"
          else
            STATE=failure
            DESC="Candidate flight indeterminate (flight=${FLIGHT_RESULT} verify=${VERIFY_RESULT})"
          fi
          echo "state=${STATE}" >> "$GITHUB_OUTPUT"
          echo "description=${DESC}" >> "$GITHUB_OUTPUT"

      - name: Report terminal candidate-flight status
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ needs.decide.outputs.head_sha }}
          STATE: ${{ steps.decide.outputs.state }}
          DESCRIPTION: ${{ steps.decide.outputs.description }}
          TARGET_URL: ${{ needs.decide.outputs.status_url }}
        run: bash scripts/ci/report-candidate-status.sh

      - name: Fail job on aggregate failure
        if: steps.decide.outputs.state == 'failure'
        run: |
          echo "::error::${{ steps.decide.outputs.description }}"
          exit 1
