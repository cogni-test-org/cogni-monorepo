name: Stack Test

# Per-node stack-test (full-stack vitest run against a Compose stack).
# Originally a job in ci.yaml fired on every PR + merge_group; relocated here
# to workflow_dispatch-only because:
#   - Slow (~10 min) and flaky → noisy on every PR.
#   - Real per-node integration validation also lives at candidate-a + the planned
#     post-merge per-node preview-build tests (see task.0413 + roadmap).
#
# Parametrized over nodes: the `discover` job globs nodes/*/app/vitest.stack.config.mts
# and the `stack-test` job runs once per node (matrix). The only per-node knobs are the
# Dockerfile that builds APP_IMAGE and the vitest config (selected via STACK_NODE →
# pnpm test:stack:docker). db-migrate reuses APP_IMAGE, so each node's bundled
# migrations apply automatically. Adding a node with a stack config auto-enrolls it.
#
# Run ad-hoc:
#   gh workflow run stack-test.yml --ref <branch>                 # all nodes
#   gh workflow run stack-test.yml --ref <branch> -f node=node-template   # one node
# Or trigger from the Actions UI.
#
# Spec: docs/spec/merge-queue-config.md § Excluded from required.

on:
  workflow_dispatch:
    inputs:
      node:
        description: "Node to run stack tests for (e.g. operator, node-template). Empty = every node with a vitest.stack.config.mts."
        required: false
        type: string
      ref:
        description: "Git ref (branch or SHA) to checkout. Defaults to the workflow's calling ref."
        required: false
        type: string

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: stack-test-${{ inputs.ref || github.ref }}-${{ inputs.node }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  NODE_VERSION: "22"
  TEMPORAL_ADDRESS: localhost:7233
  TEMPORAL_NAMESPACE: cogni-test
  TEMPORAL_TASK_QUEUE: scheduler-tasks

jobs:
  # Discover which nodes have a stack suite. Empty `node` input → every node with a
  # vitest.stack.config.mts; a specific input → just that one. Adding a node with a
  # stack config auto-enrolls it — no workflow edit needed (SCRIPTS_ARE_THE_API).
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - id: set
        env:
          NODE_INPUT: ${{ inputs.node }}
        run: |
          if [ -n "$NODE_INPUT" ]; then
            test -f "nodes/$NODE_INPUT/app/vitest.stack.config.mts" \
              || { echo "::error::no nodes/$NODE_INPUT/app/vitest.stack.config.mts"; exit 1; }
            nodes=$(printf '%s' "$NODE_INPUT" | jq -R . | jq -cs .)
          else
            nodes=$(ls -d nodes/*/app/vitest.stack.config.mts \
              | sed -E 's#nodes/([^/]+)/app/.*#\1#' | jq -R . | jq -cs .)
          fi
          echo "matrix={\"node\":$nodes}" >> "$GITHUB_OUTPUT"
          echo "Discovered nodes: $nodes"

  stack-test:
    needs: discover
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    name: stack-test (${{ matrix.node }})
    runs-on: ubuntu-latest
    env:
      STACK_NODE: ${{ matrix.node }}
      COGNI_MIGRATE_NODE: ${{ matrix.node }}
      NODE_ENV: test
      APP_ENV: test
      # Database provisioning (provision.sh creates roles + databases)
      # Root credentials for superuser connection
      POSTGRES_ROOT_USER: postgres
      POSTGRES_ROOT_PASSWORD: postgres
      # App role (RLS enforced) - matches DATABASE_URL user
      APP_DB_USER: user
      APP_DB_PASSWORD: password
      # Service role (BYPASSRLS) - matches DATABASE_SERVICE_URL user
      APP_DB_SERVICE_USER: user_service
      APP_DB_SERVICE_PASSWORD: service_password
      # Database names (required, no defaults)
      POSTGRES_DB: cogni_template_test
      COGNI_NODE_DBS: cogni_template_test
      # Image naming base (APP_IMAGE derived in step below)
      IMAGE_NAME: cogni-${{ matrix.node }}-ci
      IMAGE_TAG: ${{ github.sha }}
      DOMAIN: localhost
      LITELLM_MASTER_KEY: test-key
      LITELLM_BASE_URL: http://localhost:4000
      # The node under test serves on app:3000 — compose's PORT=${PORT:-3000} overrides
      # the image's ENV PORT (e.g. node-template's 3200), so caddy/healthcheck on :3000
      # stay node-agnostic. operator alias retained for cross-node lookups.
      COGNI_NODE_ENDPOINTS: ${{ matrix.node }}=http://app:3000,operator=http://app:3000,4ff8eac1-4eba-4ed0-931b-b1fe4f64713d=http://app:3000
      OPENROUTER_API_KEY: test-key
      EVM_RPC_URL: https://base-mainnet.g.alchemy.com/v2/fake-test-key
      POLYGON_RPC_URL: https://polygon-mainnet.g.alchemy.com/v2/fake-test-key
      TEST_BASE_URL: https://localhost/
      AUTH_SECRET: tNf5lFM9yMhdgwS5yeQB8Y2kmigblBqobkvI2XN2brg=
      METRICS_TOKEN: test-metrics-token-for-stack-tests
      SCHEDULER_API_TOKEN: test-scheduler-api-token-for-ci-min32chars
      BILLING_INGEST_TOKEN: test-billing-ingest-token-for-ci-min32ch
      INTERNAL_OPS_TOKEN: test-internal-ops-token-for-ci-min32
      OPENCLAW_GATEWAY_TOKEN: test-openclaw-gateway-token-for-ci-32ch
      OPENCLAW_GITHUB_RW_TOKEN: test-github-rw-token
      DISCORD_BOT_TOKEN: test-discord-bot-token-for-ci
      POSTHOG_API_KEY: phc_test_key_for_ci
      POSTHOG_HOST: http://localhost:18000
      LITELLM_CONFIG: litellm.test.config.yaml
      OPENCLAW_CONFIG: openclaw-gateway.test.json
      DATABASE_URL: postgresql://user:password@postgres:5432/cogni_template_test?sslmode=disable
      DATABASE_SERVICE_URL: postgresql://user_service:service_password@postgres:5432/cogni_template_test?sslmode=disable
      COGNI_REPO_URL: https://github.com/${{ github.repository }}.git
      COGNI_REPO_REF: ${{ inputs.ref || github.sha }}
      GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
      GIT_READ_USERNAME: Cogni-1729
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/powershell /usr/local/share/chromium
          docker system prune -af --volumes
          df -h /
          docker system df

      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      - name: Install ripgrep
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: ripgrep

      - name: Derive image tags
        run: |
          # INV-COUPLED-TAGS-NO-GUESSING: derive APP_IMAGE from IMAGE_NAME + IMAGE_TAG
          echo "APP_IMAGE=${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull cogni-sandbox-openclaw from GHCR
        run: |
          docker pull ghcr.io/cogni-dao/cogni-sandbox-openclaw:latest
          docker tag ghcr.io/cogni-dao/cogni-sandbox-openclaw:latest cogni-sandbox-openclaw:latest

      - name: Seed pnpm store volume from GHCR
        run: |
          docker pull ghcr.io/cogni-dao/node-template:pnpm-store-latest
          bash services/sandbox-openclaw/seed-pnpm-store.sh --image ghcr.io/cogni-dao/node-template:pnpm-store-latest --volume pnpm_store

      - name: Build app image (with GHA cache)
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./nodes/${{ matrix.node }}/app/Dockerfile
          target: runner
          tags: ${{ env.APP_IMAGE }}
          load: true
          cache-from: type=gha,scope=stack-test-${{ matrix.node }}
          cache-to: type=gha,mode=max,scope=stack-test-${{ matrix.node }}

      - name: Build scheduler-worker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: services/scheduler-worker/Dockerfile
          tags: cogni-scheduler-worker-local
          load: true
          cache-from: type=gha,scope=scheduler-worker
          cache-to: type=gha,mode=max,scope=scheduler-worker

      - name: Build sandbox runtime image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: services/sandbox-runtime
          file: services/sandbox-runtime/Dockerfile
          tags: cogni-sandbox-runtime:latest
          load: true
          cache-from: type=gha,scope=sandbox-runtime
          cache-to: type=gha,mode=max,scope=sandbox-runtime

      - name: Start app + DB + Temporal + TigerBeetle stack
        run: |
          docker network create cogni-edge || true
          docker compose -f infra/compose/runtime/docker-compose.dev.yml \
            --profile sandbox-openclaw \
            --profile tigerbeetle \
            up -d app postgres litellm mock-llm caddy temporal-postgres temporal temporal-ui scheduler-worker git-sync llm-proxy-openclaw openclaw-gateway tigerbeetle

      - name: Probe container-boundary (git-sync volume)
        run: scripts/ci/probe-repo-volume.sh

      - name: Provision database roles
        run: |
          docker compose -f infra/compose/runtime/docker-compose.dev.yml \
            --profile bootstrap run --rm db-provision

      - name: Run migrations
        run: |
          docker compose -f infra/compose/runtime/docker-compose.dev.yml \
            --profile bootstrap run --rm db-migrate

      - name: Run stack tests
        run: pnpm test:stack:docker
        env:
          COGNI_REPO_PATH: ${{ github.workspace }}
          DATABASE_URL: postgresql://user:password@localhost:55432/cogni_template_test
          DATABASE_SERVICE_URL: postgresql://user_service:service_password@localhost:55432/cogni_template_test
          TIGERBEETLE_ADDRESS: 127.0.0.1:3002

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}
          compose_file: infra/compose/runtime/docker-compose.dev.yml

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose -f infra/compose/runtime/docker-compose.dev.yml \
            --profile sandbox-openclaw \
            logs --tail=300 2>&1 | tee ${{ runner.temp }}/ci-job.log

      - name: Upload failure context artifact
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ci-failure-context-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ci-job.log
          if-no-files-found: warn
          retention-days: 14

      - name: Teardown stack
        if: always()
        run: |
          docker compose -f infra/compose/runtime/docker-compose.dev.yml down -v
