name: Candidate Flight — Infra

# Infra-only reconciliation of the candidate-a VM's Compose stack.
# This workflow is the INFRA LEVER (task.0314): it rsyncs infra/compose/** from
# a named git ref to the candidate-a VM, runs compose up, and waits for
# healthchecks. It does NOT promote any app digests and does NOT commit to
# deploy/candidate-a — that's the job of candidate-flight.yml (the APP LEVER).
#
# Ref resolution (task.0345 / bug.0344 follow-up): both the scripts checkout
# AND the rsync source ref resolve to the workflow's dispatch ref by default.
# The fallback lives at env-consumption (`inputs.ref || github.ref_name`)
# rather than input.default because GitHub does not accept `${{ github.* }}`
# in `workflow_dispatch.inputs.*.default` — it fails at dispatch-parse time.
# Dispatch from main is a no-op vs. the original `ref: main` hardcode;
# `gh workflow run candidate-flight-infra.yml --ref=<branch>` flows that
# branch's scripts/ci/deploy-infra.sh AND infra/** onto the VM — enabling
# pre-merge validation of the infra lever itself. An explicit
# `-f ref=<other>` still overrides the rsync source only; the checkout still
# tracks the dispatch ref.
#
# The two levers are orthogonal: dispatch either without blocking the other.
# See docs/spec/ci-cd.md "Argo owns reconciliation" axiom.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to source infra/compose/** from (blank = use the dispatch ref, typically main)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: candidate-flight-infra-candidate-a
  cancel-in-progress: false

jobs:
  flight-infra:
    runs-on: ubuntu-latest
    environment: candidate-a
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: candidate-a
      APP_ENV: production
      COGNI_REPO_URL: https://github.com/${{ github.repository }}.git
      COGNI_REPO_REF: ${{ inputs.ref || github.ref_name }}
      GIT_READ_USERNAME: Cogni-1729
      GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SERVICE_URL: ${{ secrets.DATABASE_SERVICE_URL }}
      POSTGRES_ROOT_USER: ${{ secrets.POSTGRES_ROOT_USER }}
      POSTGRES_ROOT_PASSWORD: ${{ secrets.POSTGRES_ROOT_PASSWORD }}
      APP_DB_USER: ${{ secrets.APP_DB_USER }}
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      APP_DB_SERVICE_USER: ${{ secrets.APP_DB_SERVICE_USER }}
      APP_DB_SERVICE_PASSWORD: ${{ secrets.APP_DB_SERVICE_PASSWORD }}
      APP_DB_READONLY_USER: ${{ secrets.APP_DB_READONLY_USER }}
      APP_DB_READONLY_PASSWORD: ${{ secrets.APP_DB_READONLY_PASSWORD }}
      APP_DB_NAME: ${{ secrets.APP_DB_NAME }}
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
      TEMPORAL_DB_USER: ${{ secrets.TEMPORAL_DB_USER }}
      TEMPORAL_DB_PASSWORD: ${{ secrets.TEMPORAL_DB_PASSWORD }}
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
      GHCR_USERNAME: Cogni-1729
      # bug.0344: Argo CD Image Updater git write-back to main. Consumed by
      # Step 7b in scripts/ci/deploy-infra.sh, which upserts the imperative
      # `argocd-image-updater-git-creds` Secret in the argocd namespace.
      # Same PAT that release.yml, promote-and-deploy.yml, promote-to-production.yml,
      # and flight-preview.yml already use for automated pushes to main.
      ACTIONS_AUTOMATION_BOT_PAT: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
      GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
      GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
      GRAFANA_CLOUD_LOKI_API_KEY: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      PROMETHEUS_REMOTE_WRITE_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
      PROMETHEUS_USERNAME: ${{ secrets.PROMETHEUS_USERNAME }}
      PROMETHEUS_PASSWORD: ${{ secrets.PROMETHEUS_PASSWORD }}
      PROMETHEUS_QUERY_URL: ${{ secrets.PROMETHEUS_QUERY_URL }}
      PROMETHEUS_READ_USERNAME: ${{ secrets.PROMETHEUS_READ_USERNAME }}
      PROMETHEUS_READ_PASSWORD: ${{ secrets.PROMETHEUS_READ_PASSWORD }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
      SCHEDULER_API_TOKEN: ${{ secrets.SCHEDULER_API_TOKEN }}
      BILLING_INGEST_TOKEN: ${{ secrets.BILLING_INGEST_TOKEN }}
      INTERNAL_OPS_TOKEN: ${{ secrets.INTERNAL_OPS_TOKEN }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
      DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      DOLTHUB_REMOTE_URL: ${{ secrets.DOLTHUB_REMOTE_URL }}
      DOLT_CREDS_JWK: ${{ secrets.DOLT_CREDS_JWK }}
      DOLT_CREDS_KEYID: ${{ secrets.DOLT_CREDS_KEYID }}
      DOLTHUB_API_TOKEN: ${{ secrets.DOLTHUB_API_TOKEN }}
      DOLTHUB_OAUTH_CLIENT_ID: ${{ secrets.DOLTHUB_OAUTH_CLIENT_ID }}
      DOLTHUB_OAUTH_CLIENT_SECRET: ${{ secrets.DOLTHUB_OAUTH_CLIENT_SECRET }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      GRAFANA_PDC_SIGNING_TOKEN: ${{ secrets.GRAFANA_PDC_SIGNING_TOKEN }}
      GRAFANA_PDC_HOSTED_GRAFANA_ID: ${{ secrets.GRAFANA_PDC_HOSTED_GRAFANA_ID }}
      GRAFANA_PDC_CLUSTER: ${{ secrets.GRAFANA_PDC_CLUSTER }}
      GRAFANA_PDC_NETWORK_ID: ${{ secrets.GRAFANA_PDC_NETWORK_ID }}
      GRAFANA_PDC_NETWORK_UUID: ${{ secrets.GRAFANA_PDC_NETWORK_UUID }}
      GH_REVIEW_APP_ID: ${{ secrets.GH_REVIEW_APP_ID }}
      GH_REVIEW_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_REVIEW_APP_PRIVATE_KEY_BASE64 }}
      GH_REPOS: ${{ vars.GH_REPOS }}
      GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
      PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_SIGNING_KEY: ${{ secrets.PRIVY_SIGNING_KEY }}
      # task.0318 Phase B — per-user trading wallets (SEPARATE_PRIVY_APP).
      # The single-operator POLY_PROTO_* + POLY_CLOB_* prototype secrets were
      # purged in Stage 4; user wallets are provisioned in a dedicated Privy
      # app and CLOB L2 creds are derived server-side at provision time.
      PRIVY_USER_WALLETS_APP_ID: ${{ secrets.PRIVY_USER_WALLETS_APP_ID }}
      PRIVY_USER_WALLETS_APP_SECRET: ${{ secrets.PRIVY_USER_WALLETS_APP_SECRET }}
      PRIVY_USER_WALLETS_SIGNING_KEY: ${{ secrets.PRIVY_USER_WALLETS_SIGNING_KEY }}
      POLY_WALLET_AEAD_KEY_HEX: ${{ secrets.POLY_WALLET_AEAD_KEY_HEX }}
      POLY_WALLET_AEAD_KEY_ID: ${{ secrets.POLY_WALLET_AEAD_KEY_ID }}
      POLY_CLOB_GEO_BLOCK_TOKEN: ${{ secrets.POLY_CLOB_GEO_BLOCK_TOKEN }}
      CONNECTIONS_ENCRYPTION_KEY: ${{ secrets.CONNECTIONS_ENCRYPTION_KEY }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      COGNI_NODE_DBS: ${{ secrets.COGNI_NODE_DBS }}
    steps:
      - name: Pre-check no candidate-flight in progress (best-effort, GR-5)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh_output=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow="Candidate Flight" \
            --status=in_progress \
            --json databaseId \
            --jq 'length' 2>&1); then
            echo "::warning::Pre-check could not query workflow runs: ${gh_output}"
            in_progress=0
          else
            in_progress="$gh_output"
          fi
          if [ "$in_progress" != "0" ]; then
            echo "::warning::${in_progress} candidate-flight run(s) in progress — infra changes may interleave"
          fi

      - name: Checkout (for scripts)
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup SSH
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST secret set for candidate-a environment — skipping infra deploy"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Testing SSH connection to $VM_HOST..."
          set +e
          OUT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6 root@"$VM_HOST" "echo SSH test successful" 2>&1)
          RC=$?
          set -e
          echo "$OUT"
          if [ $RC -ne 0 ]; then
            echo "❌ SSH failed (rc=$RC)"
            exit 1
          fi
          echo "✅ SSH connection successful"

      - name: Preflight Grafana PDC signing token
        if: env.VM_HOST != '' && env.GRAFANA_PDC_SIGNING_TOKEN != ''
        run: bash scripts/grafana-pdc-token-preflight.sh

      - name: Deploy Compose infra to candidate-a VM
        if: env.VM_HOST != ''
        run: bash scripts/ci/deploy-infra.sh --ref "$COGNI_REPO_REF"

      - name: Provision Grafana Postgres datasources
        if: env.VM_HOST != ''
        run: bash scripts/ci/provision-grafana-postgres-datasources.sh

      - name: Verify Grafana Postgres datasources
        if: env.VM_HOST != ''
        continue-on-error: true
        run: bash scripts/ci/verify-grafana-postgres-datasources.sh

      - name: Dump alloy-k8s-events state (post-deploy diagnostics)
        if: env.VM_HOST != ''
        run: |
          set +e
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new"
          COMPOSE="docker compose --project-name cogni-runtime --env-file /opt/cogni-template-runtime/.env -f /opt/cogni-template-runtime/docker-compose.yml"
          echo "=== alloy-k8s-events ps ==="
          $SSH root@"$VM_HOST" "$COMPOSE ps alloy-k8s-events 2>&1 || true"
          echo
          echo "=== alloy-k8s-events container state (raw) ==="
          $SSH root@"$VM_HOST" 'docker inspect cogni-runtime-alloy-k8s-events-1 --format "{{json .State}}" 2>&1 || true'
          echo
          echo "=== alloy-k8s-events logs (tail 200) ==="
          $SSH root@"$VM_HOST" "$COMPOSE logs --tail 200 alloy-k8s-events 2>&1 || true"

      - name: Verify db-backup Loki logs
        if: env.VM_HOST != '' && env.GRAFANA_URL != '' && env.GRAFANA_SERVICE_ACCOUNT_TOKEN != ''
        run: |
          set -euo pipefail
          query='{env="candidate-a",service="db-backup"} | json | event="db_backup.completed"'
          for attempt in $(seq 1 12); do
            result=$(scripts/loki-query.sh "$query" 600 200)
            app_count=$(jq '[.data.result[].values[][1] | fromjson? | select(.cluster == "app")] | length' <<<"$result")
            temporal_count=$(jq '[.data.result[].values[][1] | fromjson? | select(.cluster == "temporal")] | length' <<<"$result")
            if [ "$app_count" -gt 0 ] && [ "$temporal_count" -gt 0 ]; then
              echo "db-backup Loki verification passed: app=${app_count}, temporal=${temporal_count}"
              exit 0
            fi
            echo "db-backup Loki logs not visible yet (attempt ${attempt}/12): app=${app_count}, temporal=${temporal_count}"
            sleep 15
          done
          echo "::error::db-backup.completed logs did not appear in Loki for both app and temporal clusters"
          exit 1

      - name: Trigger work-items Notion sync
        if: env.VM_HOST != '' && env.WORK_ITEMS_NOTION_TOKEN != ''
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          INTERNAL_OPS_TOKEN: ${{ secrets.INTERNAL_OPS_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsS -X POST "https://${DOMAIN}/api/internal/work/notion/sync" \
            -H "Authorization: Bearer ${INTERNAL_OPS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"limit":500}' | jq .

# Activation touch for GitHub Actions workflow registration.
