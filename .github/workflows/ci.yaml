name: CI

on:
  pull_request:
  merge_group: # Required so GitHub Merge Queue re-runs gates on the rebased queue candidate (task.0391)
  push:
    branches: [canary, staging, main]

permissions:
  contents: read
  actions: read # Required for CI telemetry to fetch job logs
  packages: read # Required for pulling migrator images from GHCR

concurrency:
  # github.ref distinguishes pull_request, merge_group (gh-readonly-queue/main/...),
  # and push:main, so each axis serializes independently and the queue isn't cancelled
  # by a concurrent PR push.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: 1
  NODE_VERSION: "22"
  # Temporal env vars - required by serverEnv() Zod schema
  # All CI jobs (including stack-test) use localhost:7233 since tests run on host, not in Docker
  TEMPORAL_ADDRESS: localhost:7233
  TEMPORAL_NAMESPACE: cogni-test
  TEMPORAL_TASK_QUEUE: scheduler-tasks

jobs:
  # Fast gate: install → typecheck → lint
  static:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      LITELLM_MASTER_KEY: build-key
      AUTH_SECRET: tNf5lFM9yMhdgwS5yeQB8Y2kmigblBqobkvI2XN2brg=
      SCHEDULER_API_TOKEN: test-scheduler-api-token-for-ci-min32chars
      BILLING_INGEST_TOKEN: test-billing-ingest-token-for-ci-min32ch
      INTERNAL_OPS_TOKEN: test-internal-ops-token-for-ci-min32
      OPENCLAW_GATEWAY_TOKEN: test-openclaw-gateway-token-for-ci-32ch
      OPENCLAW_GITHUB_RW_TOKEN: test-github-rw-token
      DISCORD_BOT_TOKEN: test-discord-bot-token-for-ci
      POSTHOG_API_KEY: phc_test_key_for_ci
      POSTHOG_HOST: http://localhost:18000

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  # Single-node-scope policy gate (task.0381). Each non-operator node owns
  # nodes/<X>/; operator owns nodes/operator/ + everything else (expressed as
  # the negation of the other-node filters). PRs may touch exactly one domain.
  # Ride-along exception: a bounded whitelist of operator paths may ride a
  # single non-operator node PR — pnpm-lock.yaml (mechanical side-effect of
  # node-level package.json changes), work/** (per-task work items, projects,
  # charters; high merge-conflict + index-regen churn until task tracking
  # moves to Dolt), docs/** (cross-cutting prose updates linked to a node
  # change), .claude/skills/** (agent-facing skill docs that codify the
  # principle a node-scoped fix demonstrates; treated like docs/), and exact
  # single-node-scope policy maintenance files. Whitelist must mirror
  # RIDE_ALONG_PATTERNS in tests/ci-invariants/classify.ts.
  # Lands non-required initially; promote via gh api after a real cross-node
  # test PR proves the diagnostic (see work/items/task.0381.* §Manual Steps).
  single-node-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0 # required so paths-filter can resolve base...HEAD on fork PRs

      - id: domains
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          list-files: json # exposes <filter>_files so we can inspect which paths matched
          # Required so the operator filter's `**` + `!nodes/<X>/**` negations
          # actually subtract. Default `some` quantifier OR's the rules, so
          # `**` matches everything and the negations are dead — a resy-only PR
          # would (incorrectly) classify as resy + operator. Per-node filters
          # have a single rule each, so the quantifier is a no-op for them.
          predicate-quantifier: "every"
          # Filter block is CATALOG_IS_SSOT — generated from the nodes/* listing
          # by scripts/ci/render-scope-filters.sh. Adding nodes/<slug>/ no longer
          # needs a hand-edited `<slug>:` filter + `!nodes/<slug>/**` negation;
          # run `pnpm gen:scope-filters`. CI (`--check`, unit job) fails on drift.
          filters: |
            # >>> GENERATED scope-filters (scripts/ci/render-scope-filters.sh) — DO NOT EDIT BY HAND
            canary:
              - 'nodes/canary/**'
            node-template:
              - 'nodes/node-template/**'
            resy:
              - 'nodes/resy/**'
            operator:
              - '**'
              - '!nodes/canary/**'
              - '!nodes/node-template/**'
              - '!nodes/resy/**'
            # <<< GENERATED scope-filters

      # Intentionally inline — single-workflow gate, no logic duplicated across
      # workflows. SCRIPTS_ARE_THE_API targets cross-workflow drift, not unique
      # gate policy. See docs/spec/node-ci-cd-contract.md.
      - name: Enforce single-domain scope
        env:
          MATCHED: ${{ steps.domains.outputs.changes }}
          OPERATOR_FILES: ${{ steps.domains.outputs.operator_files }}
        run: |
          count=$(jq 'length' <<<"$MATCHED")
          if [ "$count" -le 1 ]; then exit 0; fi

          # The single non-operator node (if exactly one), for the NODE_BIRTH
          # wiring carve-out below.
          NODE=$(jq -r 'map(select(. != "operator")) | if length == 1 then .[0] else "" end' <<<"$MATCHED")

          # Ride-along exception: |S|=2, operator ∈ S, and every operator-matched
          # path is in the whitelist OR is the node's OWN deploy wiring (bug.5086
          # NODE_BIRTH — catalog/overlays/AppSet for the one node in S). Whitelist
          # + isNodeWiring must mirror classify.ts (parity by convention; the
          # parity spec covers the TS side only).
          if [ "$count" -eq 2 ] \
             && jq -e 'index("operator") != null' <<<"$MATCHED" >/dev/null \
             && jq -e --arg node "$NODE" 'all(
               . == "pnpm-lock.yaml"
               or startswith("work/")
               or startswith("docs/")
               or startswith(".claude/skills/")
               or . == ".github/workflows/ci.yaml"
               or . == "packages/repo-spec/AGENTS.md"
               or . == "packages/repo-spec/src/accessors.ts"
               or . == "tests/ci-invariants/classify.ts"
               or startswith("tests/ci-invariants/fixtures/single-node-scope/")
               or . == "tests/ci-invariants/single-node-scope-meta.spec.ts"
               or . == "tests/unit/packages/repo-spec/accessors.test.ts"
               or ($node != "" and (
                    . == ("infra/catalog/" + $node + ".yaml")
                    or . == "infra/k8s/base/scheduler-worker/configmap.yaml"
                    or . == "infra/compose/edge/configs/Caddyfile.tmpl"
                    or test("^infra/k8s/overlays/[^/]+/" + $node + "/")
                    or test("^infra/k8s/argocd/[^/]*applicationset[^/]*\\.ya?ml$")
                  ))
             )' <<<"$OPERATOR_FILES" >/dev/null; then
            echo "single-domain scope OK (ride-along applied)"
            exit 0
          fi

          echo "::error::PR spans $count node domains: $(jq -r 'join(", ")' <<<"$MATCHED"). Each node owns its directory; operator owns nodes/operator + repo infra. Split into $count PRs, one per domain."
          exit 1

  unit:
    runs-on: ubuntu-latest
    needs: static
    env:
      NODE_ENV: test
      LITELLM_MASTER_KEY: build-key
      AUTH_SECRET: tNf5lFM9yMhdgwS5yeQB8Y2kmigblBqobkvI2XN2brg=
      SCHEDULER_API_TOKEN: test-scheduler-api-token-for-ci-min32chars
      BILLING_INGEST_TOKEN: test-billing-ingest-token-for-ci-min32ch
      INTERNAL_OPS_TOKEN: test-internal-ops-token-for-ci-min32
      OPENCLAW_GATEWAY_TOKEN: test-openclaw-gateway-token-for-ci-32ch
      OPENCLAW_GITHUB_RW_TOKEN: test-github-rw-token
      DISCORD_BOT_TOKEN: test-discord-bot-token-for-ci
      POSTHOG_API_KEY: phc_test_key_for_ci
      POSTHOG_HOST: http://localhost:18000

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          # fetch-depth: 0 — scripts/db/check-migrations-immutable.mjs runs
          # `git merge-base origin/main HEAD`; the default shallow clone (depth=1)
          # leaves origin/main unreachable and forces a runtime fetch.
          fetch-depth: 0

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      - name: Repository policy check
        run: pnpm check:root-layout

      - name: REUSE SPDX compliance
        uses: fsfe/reuse-action@772649cfa03a64a08c458c7cca9a6a473d74e7f9 # v6

      - name: Validate chain configuration
        run: pnpm validate:chain

      - name: Format check
        run: pnpm format:check

      - name: UI tokens check
        run: bash scripts/check-ui-tokens.sh

      - name: Documentation check
        run: pnpm check:docs

      - name: Sync-manifest schema check (CATALOG_IS_SSOT pattern)
        run: |
          pipx install 'check-jsonschema==0.37.1'
          check-jsonschema --schemafile .cogni/sync-manifest.schema.json .cogni/sync-manifest.yaml

      - name: Architecture check
        run: pnpm arch:check

      # Schema-migration guards (task: doltgres-migration-safety):
      #   1. immutable .sql / *_snapshot.json on origin/main (drizzle-orm runtime
      #      migrator skips by `folderMillis`, never by hash — modifying an
      #      applied migration silently no-ops on deployed DBs)
      #   2. strict-monotonic `when` in _journal.json (silent-skip variant)
      #   3. drizzle-kit's own snapshot-chain check
      - name: Database migration guards
        run: pnpm db:check

      # bug.0344 — structural guardrail on image-updater scope. Positive
      # allowlist: only ApplicationSets named in ALLOWLIST inside the
      # script are permitted to carry argocd-image-updater annotations.
      # Any new or existing *-applicationset.yaml under infra/k8s/argocd/
      # that sneaks in annotations without updating the allowlist fails
      # closed. Current allowlist is preview-only (see script header for
      # why candidate-a + production are intentionally excluded).
      - name: Image Updater scope (bug.0344)
        run: bash scripts/ci/check-image-updater-scope.sh

      # task.0284 — fixture-driven regression tests for the secrets:set CLI
      # (scripts/secrets/set-secret.sh). Uses a stdin-recording bao shim; no
      # real OpenBao, no network. Ported from node-template with the substrate.
      - name: secrets:set CLI tests (task.0284)
        run: bash scripts/ci/tests/set-secret.test.sh

      # task.5094 — per-node secret fan-out (seed_node_app_secrets). Drives the
      # catalog-gated fan-out against the real infra/secrets-catalog.yaml with
      # stubbed runtime deps; proves distinct-value-per-node + custody gating.
      - name: secrets fan-out tests (task.5094)
        run: bash scripts/ci/tests/secrets-fanout.test.sh

      # task.5078 — catalog-driven edge routing. Asserts the committed Caddyfile
      # is in sync with the catalog (drift gate that makes "add a node = 1
      # catalog PR" enforceable), every type:node has an edge block (canary
      # included), and catalog node_port == per-env overlay Service nodePort.
      - name: edge routing tests (task.5078)
        run: bash scripts/ci/tests/render-caddyfile.test.sh

      # Catalog-driven node DNS: idempotent Cloudflare A-record upsert +
      # reconcile fans one record per non-primary type:node. Stateful CF shim,
      # no network. Closes the node-formation DNS gap (catalog → overlays →
      # flight → secrets all auto-fan, but the public host never resolved).
      - name: node DNS reconcile tests
        run: bash scripts/ci/tests/reconcile-node-dns.test.sh

      - name: scheduler node routing tests
        run: bash scripts/ci/render-scheduler-worker-endpoints.sh --check

      # single-node-scope filters are CATALOG_IS_SSOT: generated from the
      # nodes/* listing. Fails if a node was added/removed under nodes/ without
      # regenerating the dorny filter block (run `pnpm gen:scope-filters`).
      - name: single-node-scope filter drift (CATALOG_IS_SSOT)
        run: bash scripts/ci/render-scope-filters.sh --check

      - name: scheduler runtime routing tests
        run: bash scripts/ci/tests/scheduler-runtime-routing.test.sh

      - name: Unit + contract coverage tests
        run: pnpm test:ci

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ github.sha }}
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
          retention-days: 1
          if-no-files-found: error

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  component:
    # Skip on merge_group: not in required-status-checks (see infra/github/branch-protection.json),
    # so the queue doesn't gate on it. Re-running on the rebased candidate burns ~3 min for marginal
    # incremental signal vs PR-time. Spec: docs/spec/merge-queue-config.md § Excluded from required.
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    needs: static
    env:
      NODE_ENV: test
      LITELLM_MASTER_KEY: build-key
      AUTH_SECRET: tNf5lFM9yMhdgwS5yeQB8Y2kmigblBqobkvI2XN2brg=
      SCHEDULER_API_TOKEN: test-scheduler-api-token-for-ci-min32chars
      BILLING_INGEST_TOKEN: test-billing-ingest-token-for-ci-min32ch
      INTERNAL_OPS_TOKEN: test-internal-ops-token-for-ci-min32
      OPENCLAW_GATEWAY_TOKEN: test-openclaw-gateway-token-for-ci-32ch
      OPENCLAW_GITHUB_RW_TOKEN: test-github-rw-token
      DISCORD_BOT_TOKEN: test-discord-bot-token-for-ci
      POSTHOG_API_KEY: phc_test_key_for_ci
      POSTHOG_HOST: http://localhost:18000

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm packages:build

      - name: Install ripgrep
        uses: taiki-e/install-action@735e5933943122c5ac182670a935f54a949265c1 # v2
        with:
          tool: ripgrep

      - name: Verify ripgrep
        run: rg --version

      - name: Build sandbox runtime image
        run: pnpm sandbox:docker:build

      - name: Component tests (testcontainers)
        run: pnpm test:component

      # Doltgres-migrator regression: boots dolthub/doltgresql:latest in its
      # own container (separate from the Postgres globalSetup the rest of
      # test:component uses) and exercises migrate-doltgres.mjs + verifier
      # end-to-end. Proves the silent-skip drift gap is caught at runtime,
      # complementing the static CI guard in `db:check:immutable`.
      - name: Doltgres migrator regression (testcontainers)
        run: pnpm test:doltgres-migrate

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  sonar:
    runs-on: ubuntu-latest
    needs: unit
    # Sonar is PR-time signal only (decorates the PR with a comment + Sonar dashboard link).
    # Has no meaning on the merge_group ref; skip to save runtime.
    if: needs.unit.result == 'success' && github.event_name != 'merge_group'
    permissions:
      contents: read
      pull-requests: write # Required for PR decoration
      actions: read # Required for CI telemetry

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
        with:
          fetch-depth: 0 # Required for SonarCloud git blame

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download coverage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: coverage-${{ github.sha }}
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@884b79409bbd464b2a59edc326a4b77dc56b2195 # v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}
