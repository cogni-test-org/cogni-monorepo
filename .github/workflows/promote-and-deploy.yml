name: Promote and Deploy

# Spec: work/items/task.0376 (per-node lane isolation, preview + production matrix).
# Companion to candidate-flight.yml (task.0372). Same primitive: matrix-fanned
# per-node cells push to deploy/<env>-<node>; aggregator computes current-sha
# from merge-base of per-node tips and merges source-sha-by-app.json rollup.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: preview
        type: choice
        options: [preview, production]
      source_sha:
        description: "SHA of source images. Empty for production = preview-forward mode (per-node, reads deploy/preview-<node>)."
        required: false
      build_sha:
        description: "SHA baked into images at build time (PR branch head). Defaults to source_sha. Ignored in preview-forward mode."
        required: false
      nodes:
        description: "CSV of nodes to promote (default: all NODE_TARGETS + scheduler-worker). Set by flight-preview.yml from RESOLVED_TARGETS."
        required: false
        default: ""
      skip_infra:
        description: "Skip deploy-infra (Compose) step — use for app-only changes; infra has its own lever (candidate-flight-infra.yml)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write
  packages: read
  actions: read

concurrency:
  group: promote-deploy-${{ inputs.environment || github.ref_name }}
  cancel-in-progress: false

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      head_sha: ${{ steps.env.outputs.head_sha }}
      build_sha: ${{ steps.env.outputs.build_sha }}
      deploy_branch: ${{ steps.env.outputs.deploy_branch }}
      preview_forward: ${{ steps.env.outputs.preview_forward }}
      targets_json: ${{ steps.targets.outputs.targets_json }}
      has_targets: ${{ steps.targets.outputs.has_targets }}
    steps:
      - name: Determine environment
        id: env
        run: |
          set -euo pipefail
          ENV="${{ inputs.environment }}"
          RAW_SOURCE_SHA="${{ inputs.source_sha }}"
          PREVIEW_FORWARD=false
          if [ "$ENV" = "production" ] && [ -z "$RAW_SOURCE_SHA" ]; then
            PREVIEW_FORWARD=true
            RAW_SOURCE_SHA="${{ github.sha }}"
          fi
          SHA="${RAW_SOURCE_SHA:-${{ github.sha }}}"
          BUILD_SHA="${{ inputs.build_sha }}"
          BUILD_SHA="${BUILD_SHA:-$SHA}"
          case "$ENV" in
            preview)    DEPLOY_BRANCH=deploy/preview ;;
            production) DEPLOY_BRANCH=deploy/production ;;
            *)          echo "❌ Unknown environment: $ENV"; exit 1 ;;
          esac
          {
            echo "environment=$ENV"
            echo "head_sha=$SHA"
            echo "build_sha=$BUILD_SHA"
            echo "deploy_branch=$DEPLOY_BRANCH"
            echo "preview_forward=$PREVIEW_FORWARD"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout (for image-tags lib)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.env.outputs.head_sha }}
          fetch-depth: 1

      - name: Resolve target node list
        id: targets
        env:
          NODES_INPUT: ${{ inputs.nodes }}
          OVERLAY_ENV: ${{ steps.env.outputs.environment }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci/lib/image-tags.sh
          . scripts/ci/lib/image-tags.sh
          if [ -n "$NODES_INPUT" ]; then
            IFS=',' read -r -a raw <<<"${NODES_INPUT// /}"
          else
            raw=("${ALL_TARGETS[@]}")
          fi
          # Filter to targets that have a per-env overlay in app-src. ApplicationSets
          # are env-hardcoded; a target with no overlay (e.g. node-template in
          # preview/production) has no Argo destination and would fail the rsync at
          # the promote-k8s `Sync infra/k8s` step. The overlay directory is the SSoT
          # for "this target deploys to this env".
          list=()
          skipped=()
          for t in "${raw[@]}"; do
            if [ -d "infra/k8s/overlays/${OVERLAY_ENV}/${t}" ]; then
              list+=("$t")
            else
              skipped+=("$t")
            fi
          done
          if [ "${#skipped[@]}" -gt 0 ]; then
            echo "::warning::Skipping targets without ${OVERLAY_ENV} overlay: ${skipped[*]}"
          fi
          if [ "${#list[@]}" -eq 0 ]; then
            echo "::error::Empty target list (no overlays under infra/k8s/overlays/${OVERLAY_ENV}/)"
            exit 1
          fi
          targets_json=$(printf '%s\n' "${list[@]}" \
            | python3 -c 'import json,sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')
          echo "targets_json=$targets_json" >> "$GITHUB_OUTPUT"
          echo "has_targets=true" >> "$GITHUB_OUTPUT"
          echo "Targets: ${list[*]}"

  reconcile-appset:
    needs: decide
    if: needs.decide.outputs.has_targets == 'true'
    concurrency:
      group: reconcile-appset-${{ needs.decide.outputs.environment }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: ${{ needs.decide.outputs.environment }}
    steps:
      # Checkout the workflow dispatch ref (not source_sha) — the AppSet
      # YAML is part of the CI control plane, not the artifact under
      # promotion. Mirrors candidate-flight.yml's reconcile-appset.
      - uses: actions/checkout@v4

      - name: Setup SSH
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST — skipping AppSet reconcile"
            echo "has_vm=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_vm=true" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Apply ApplicationSet
        if: steps.ssh-setup.outputs.has_vm == 'true'
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          DEPLOY_ENVIRONMENT: ${{ needs.decide.outputs.environment }}
        run: |
          set -euo pipefail
          APPSET_FILE="infra/k8s/argocd/${DEPLOY_ENVIRONMENT}-applicationset.yaml"
          # shellcheck disable=SC2086
          scp $SSH_OPTS "$APPSET_FILE" root@"$VM_HOST":/tmp/appset.yaml
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/appset.yaml -n argocd && rm -f /tmp/appset.yaml"

  promote-k8s:
    needs: [decide, reconcile-appset]
    if: needs.decide.outputs.has_targets == 'true'
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(needs.decide.outputs.targets_json) }}
    concurrency:
      group: flight-${{ needs.decide.outputs.environment }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: ${{ needs.decide.outputs.environment }}
    steps:
      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: app-src

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Checkout per-node preview branch (preview-forward mode)
        if: needs.decide.outputs.preview_forward == 'true'
        uses: actions/checkout@v4
        with:
          ref: deploy/preview-${{ matrix.node }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          path: preview-src

      - name: Resolve digest for this node
        id: digest
        env:
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
          PREVIEW_FORWARD: ${{ needs.decide.outputs.preview_forward }}
        run: |
          set -euo pipefail
          # shellcheck source=scripts/ci/lib/image-tags.sh
          . app-src/scripts/ci/lib/image-tags.sh
          if [ "$PREVIEW_FORWARD" = "true" ]; then
            # Reuse the existing per-overlay digest resolver (battle-tested);
            # it emits digests_json={...} for ALL_TARGETS, then we index by NODE.
            PREVIEW_OVERLAY_ROOT="${{ github.workspace }}/preview-src/infra/k8s/overlays/preview"
            export PREVIEW_OVERLAY_ROOT
            DIGESTS_JSON=$(bash app-src/scripts/ci/resolve-digests-from-preview.sh \
              | grep '^digests_json=' | head -1 | sed 's/^digests_json=//')
            if [ -z "$DIGESTS_JSON" ]; then
              echo "::error::preview-forward: resolve-digests-from-preview emitted no digests_json"
              exit 1
            fi
            DIGEST=$(printf '%s' "$DIGESTS_JSON" | jq -r --arg k "$NODE" '.[$k] // ""')
            if [ -z "$DIGEST" ]; then
              echo "::error::preview-forward: no digest for $NODE in deploy/preview-$NODE"
              exit 1
            fi
            APP_SOURCE_SHA=$(jq -r --arg k "$NODE" '.[$k] // ""' "${{ github.workspace }}/preview-src/.promote-state/source-sha-by-app.json")
            if [ -z "$APP_SOURCE_SHA" ]; then
              echo "::error::preview-forward: no source_sha for $NODE in preview map"
              exit 1
            fi
          else
            full_tag=$(image_tag_for_target "$(image_name_for_target "$NODE")" "preview-${HEAD_SHA}" "$NODE")
            digest_only=$(docker buildx imagetools inspect "$full_tag" --raw 2>/dev/null \
              | python3 -c "import json,sys; print(json.load(sys.stdin).get('digest',''))" 2>/dev/null || true)
            if [ -z "$digest_only" ]; then
              digest_only=$(docker buildx imagetools inspect "$full_tag" 2>/dev/null \
                | grep -oP 'Digest:\s+\Ksha256:[a-f0-9]+' | head -1 || true)
            fi
            if [ -z "$digest_only" ]; then
              echo "::warning::Image not found: $full_tag (not built — skipping $NODE)"
              echo "digest=" >> "$GITHUB_OUTPUT"
              echo "promoted=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            DIGEST="${full_tag%%:*}@${digest_only}"
            APP_SOURCE_SHA="${{ needs.decide.outputs.build_sha }}"
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "source_sha=$APP_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "promoted=true" >> "$GITHUB_OUTPUT"

      - name: Prepare per-node deploy branch (bootstrap from umbrella if missing)
        if: steps.digest.outputs.promoted == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          PER_NODE_BRANCH: deploy/${{ needs.decide.outputs.environment }}-${{ matrix.node }}
          UMBRELLA_BRANCH: deploy/${{ needs.decide.outputs.environment }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" deploy-branch
          cd deploy-branch
          git fetch origin "+refs/heads/deploy/*:refs/remotes/origin/deploy/*"
          if git rev-parse --verify --quiet "refs/remotes/origin/${PER_NODE_BRANCH}" >/dev/null; then
            git checkout -B "${PER_NODE_BRANCH}" "origin/${PER_NODE_BRANCH}"
          else
            echo "::warning::Per-node branch ${PER_NODE_BRANCH} missing — bootstrapping from ${UMBRELLA_BRANCH}"
            git checkout -B "${PER_NODE_BRANCH}" "origin/${UMBRELLA_BRANCH}"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync infra/k8s + per-node catalog from app-src
        if: steps.digest.outputs.promoted == 'true'
        env:
          NODE: ${{ matrix.node }}
          OVERLAY_ENV: ${{ needs.decide.outputs.environment }}
        run: |
          set -euo pipefail
          # env-state.yaml protection (bug.0334) — preserve VM-truth files;
          # rewrite everything else under infra/k8s/ from app-src.
          rsync -a --ignore-existing \
            --include='*/' --include='env-state.yaml' --exclude='*' \
            app-src/infra/k8s/ deploy-branch/infra/k8s/
          rsync -a --delete --exclude='env-state.yaml' \
            app-src/infra/k8s/base/ deploy-branch/infra/k8s/base/
          mkdir -p "deploy-branch/infra/k8s/overlays/${OVERLAY_ENV}/${NODE}"
          rsync -a --delete --exclude='env-state.yaml' \
            "app-src/infra/k8s/overlays/${OVERLAY_ENV}/${NODE}/" \
            "deploy-branch/infra/k8s/overlays/${OVERLAY_ENV}/${NODE}/"
          mkdir -p deploy-branch/infra/catalog
          cp "app-src/infra/catalog/${NODE}.yaml" "deploy-branch/infra/catalog/${NODE}.yaml"

      - name: Promote digest + record source-sha
        if: steps.digest.outputs.promoted == 'true'
        working-directory: deploy-branch
        env:
          OVERLAY_ENV: ${{ needs.decide.outputs.environment }}
          NODE: ${{ matrix.node }}
          DIGEST: ${{ steps.digest.outputs.digest }}
          SOURCE_SHA: ${{ steps.digest.outputs.source_sha }}
        run: |
          set -euo pipefail
          ../app-src/scripts/ci/promote-k8s-image.sh --no-commit \
            --env "$OVERLAY_ENV" --app "$NODE" --digest "$DIGEST"
          APP="$NODE" SOURCE_SHA="$SOURCE_SHA" \
            bash ../app-src/scripts/ci/update-source-sha-map.sh

      - name: Commit and push
        id: push
        if: steps.digest.outputs.promoted == 'true'
        working-directory: deploy-branch
        env:
          PER_NODE_BRANCH: deploy/${{ needs.decide.outputs.environment }}-${{ matrix.node }}
          NODE: ${{ matrix.node }}
          HEAD_SHA: ${{ needs.decide.outputs.head_sha }}
          OVERLAY_ENV: ${{ needs.decide.outputs.environment }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            DEPLOY_SHA=$(git rev-parse HEAD)
            echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No diff for ${NODE} — deploy_branch_sha=${DEPLOY_SHA}"
            exit 0
          fi
          SHORT=$(echo "$HEAD_SHA" | cut -c1-8)
          git commit -m "promote ${OVERLAY_ENV} ${NODE}: ${SHORT}"
          git push origin "HEAD:${PER_NODE_BRANCH}"
          DEPLOY_SHA=$(git rev-parse HEAD)
          echo "deploy_branch_sha=$DEPLOY_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload per-cell artifact
        if: always()
        env:
          NODE: ${{ matrix.node }}
          DEPLOY_SHA: ${{ steps.push.outputs.deploy_branch_sha }}
          PROMOTED: ${{ steps.digest.outputs.promoted }}
        run: |
          mkdir -p out
          printf '%s' "${DEPLOY_SHA:-}" > "out/deploy-sha-${NODE}.txt"
          printf '%s' "${PROMOTED:-false}" > "out/promoted-${NODE}.txt"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: cell-${{ matrix.node }}
          path: out/
          retention-days: 1

  deploy-infra:
    if: inputs.skip_infra != 'true' && needs.decide.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    needs: [decide, promote-k8s]
    environment: ${{ needs.decide.outputs.environment }}
    # 45m (was 15m, #785-era default): a cold-cache VM provisioning a NEW node
    # pulls the sandbox + LiteLLM images (~13m) BEFORE db-provision runs, so 15m
    # times out before `cogni_node_template` is created — node-template-preview
    # 502'd indefinitely. candidate-flight-infra.yml has no cap (360m default),
    # which is why candidate-a never hit this. Bounded bump, not unbounded.
    timeout-minutes: 45
    concurrency:
      group: deploy-infra-${{ needs.decide.outputs.environment }}
      cancel-in-progress: false
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: ${{ needs.decide.outputs.environment }}
      APP_ENV: production
      COGNI_REPO_URL: https://github.com/${{ github.repository }}.git
      COGNI_REPO_REF: ${{ needs.decide.outputs.head_sha }}
      GIT_READ_USERNAME: Cogni-1729
      GIT_READ_TOKEN: ${{ secrets.GIT_READ_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_SERVICE_URL: ${{ secrets.DATABASE_SERVICE_URL }}
      POSTGRES_ROOT_USER: ${{ secrets.POSTGRES_ROOT_USER }}
      POSTGRES_ROOT_PASSWORD: ${{ secrets.POSTGRES_ROOT_PASSWORD }}
      APP_DB_USER: ${{ secrets.APP_DB_USER }}
      APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
      APP_DB_SERVICE_USER: ${{ secrets.APP_DB_SERVICE_USER }}
      APP_DB_SERVICE_PASSWORD: ${{ secrets.APP_DB_SERVICE_PASSWORD }}
      APP_DB_READONLY_USER: ${{ secrets.APP_DB_READONLY_USER }}
      APP_DB_READONLY_PASSWORD: ${{ secrets.APP_DB_READONLY_PASSWORD }}
      APP_DB_NAME: ${{ secrets.APP_DB_NAME }}
      LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      EVM_RPC_URL: ${{ secrets.EVM_RPC_URL }}
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
      TEMPORAL_DB_USER: ${{ secrets.TEMPORAL_DB_USER }}
      TEMPORAL_DB_PASSWORD: ${{ secrets.TEMPORAL_DB_PASSWORD }}
      GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
      GHCR_USERNAME: Cogni-1729
      ACTIONS_AUTOMATION_BOT_PAT: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
      GRAFANA_CLOUD_LOKI_URL: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
      GRAFANA_CLOUD_LOKI_USER: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
      GRAFANA_CLOUD_LOKI_API_KEY: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
      METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
      PROMETHEUS_REMOTE_WRITE_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
      PROMETHEUS_USERNAME: ${{ secrets.PROMETHEUS_USERNAME }}
      PROMETHEUS_PASSWORD: ${{ secrets.PROMETHEUS_PASSWORD }}
      PROMETHEUS_QUERY_URL: ${{ secrets.PROMETHEUS_QUERY_URL }}
      PROMETHEUS_READ_USERNAME: ${{ secrets.PROMETHEUS_READ_USERNAME }}
      PROMETHEUS_READ_PASSWORD: ${{ secrets.PROMETHEUS_READ_PASSWORD }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
      SCHEDULER_API_TOKEN: ${{ secrets.SCHEDULER_API_TOKEN }}
      BILLING_INGEST_TOKEN: ${{ secrets.BILLING_INGEST_TOKEN }}
      INTERNAL_OPS_TOKEN: ${{ secrets.INTERNAL_OPS_TOKEN }}
      OPENCLAW_GATEWAY_TOKEN: ${{ secrets.OPENCLAW_GATEWAY_TOKEN }}
      OPENCLAW_GITHUB_RW_TOKEN: ${{ secrets.OPENCLAW_GITHUB_RW_TOKEN }}
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
      DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      DOLTHUB_REMOTE_URL: ${{ secrets.DOLTHUB_REMOTE_URL }}
      DOLT_CREDS_JWK: ${{ secrets.DOLT_CREDS_JWK }}
      DOLT_CREDS_KEYID: ${{ secrets.DOLT_CREDS_KEYID }}
      DOLTHUB_API_TOKEN: ${{ secrets.DOLTHUB_API_TOKEN }}
      DOLTHUB_OAUTH_CLIENT_ID: ${{ secrets.DOLTHUB_OAUTH_CLIENT_ID }}
      DOLTHUB_OAUTH_CLIENT_SECRET: ${{ secrets.DOLTHUB_OAUTH_CLIENT_SECRET }}
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
      GRAFANA_PDC_SIGNING_TOKEN: ${{ secrets.GRAFANA_PDC_SIGNING_TOKEN }}
      GRAFANA_PDC_HOSTED_GRAFANA_ID: ${{ secrets.GRAFANA_PDC_HOSTED_GRAFANA_ID }}
      GRAFANA_PDC_CLUSTER: ${{ secrets.GRAFANA_PDC_CLUSTER }}
      GRAFANA_PDC_NETWORK_ID: ${{ secrets.GRAFANA_PDC_NETWORK_ID }}
      GRAFANA_PDC_NETWORK_UUID: ${{ secrets.GRAFANA_PDC_NETWORK_UUID }}
      GH_REVIEW_APP_ID: ${{ secrets.GH_REVIEW_APP_ID }}
      GH_REVIEW_APP_PRIVATE_KEY_BASE64: ${{ secrets.GH_REVIEW_APP_PRIVATE_KEY_BASE64 }}
      GH_REPOS: ${{ vars.GH_REPOS }}
      GH_WEBHOOK_SECRET: ${{ secrets.GH_WEBHOOK_SECRET }}
      PRIVY_APP_ID: ${{ secrets.PRIVY_APP_ID }}
      PRIVY_APP_SECRET: ${{ secrets.PRIVY_APP_SECRET }}
      PRIVY_SIGNING_KEY: ${{ secrets.PRIVY_SIGNING_KEY }}
      PRIVY_USER_WALLETS_APP_ID: ${{ secrets.PRIVY_USER_WALLETS_APP_ID }}
      PRIVY_USER_WALLETS_APP_SECRET: ${{ secrets.PRIVY_USER_WALLETS_APP_SECRET }}
      PRIVY_USER_WALLETS_SIGNING_KEY: ${{ secrets.PRIVY_USER_WALLETS_SIGNING_KEY }}
      POLY_WALLET_AEAD_KEY_HEX: ${{ secrets.POLY_WALLET_AEAD_KEY_HEX }}
      POLY_WALLET_AEAD_KEY_ID: ${{ secrets.POLY_WALLET_AEAD_KEY_ID }}
      POLY_WALLET_ALLOW_STUB_CREDS: ${{ secrets.POLY_WALLET_ALLOW_STUB_CREDS }}
      POLY_CLOB_GEO_BLOCK_TOKEN: ${{ secrets.POLY_CLOB_GEO_BLOCK_TOKEN }}
      COPY_TRADE_TARGET_WALLETS: ${{ secrets.COPY_TRADE_TARGET_WALLETS }}
      CONNECTIONS_ENCRYPTION_KEY: ${{ secrets.CONNECTIONS_ENCRYPTION_KEY }}
      POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
      POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      COGNI_NODE_DBS: ${{ secrets.COGNI_NODE_DBS }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Setup SSH
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "⚠️ No VM_HOST — skipping infra deploy"
            exit 0
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Preflight Grafana PDC signing token
        if: env.VM_HOST != '' && env.GRAFANA_PDC_SIGNING_TOKEN != ''
        run: bash scripts/grafana-pdc-token-preflight.sh

      - name: Deploy infrastructure
        if: env.VM_HOST != ''
        run: scripts/ci/deploy-infra.sh --ref main

      - name: Provision Grafana Postgres datasources
        if: env.VM_HOST != ''
        run: bash scripts/ci/provision-grafana-postgres-datasources.sh

      - name: Verify Grafana Postgres datasources
        if: env.VM_HOST != ''
        continue-on-error: true
        run: bash scripts/ci/verify-grafana-postgres-datasources.sh

      - name: Upload deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: infra-deployment-artifacts-${{ github.run_id }}
          path: ${{ runner.temp }}/deploy-infra-${{ github.run_id }}/
          if-no-files-found: warn
          retention-days: 14

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  verify-deploy:
    needs: [decide, promote-k8s, deploy-infra]
    if: |
      always() &&
      needs.promote-k8s.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        node: ${{ fromJson(needs.decide.outputs.targets_json) }}
    concurrency:
      group: verify-deploy-${{ needs.decide.outputs.environment }}-${{ matrix.node }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    environment: ${{ needs.decide.outputs.environment }}
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      DEPLOY_ENVIRONMENT: ${{ needs.decide.outputs.environment }}
    steps:
      - name: Checkout (workspace root for composite actions)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Checkout app source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}
          path: app-src

      - name: Checkout per-node deploy branch
        uses: actions/checkout@v4
        with:
          ref: deploy/${{ needs.decide.outputs.environment }}-${{ matrix.node }}
          path: deploy-branch
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Download per-cell artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          name: cell-${{ matrix.node }}
          path: ${{ runner.temp }}/

      - name: Resolve cell state
        id: cell
        env:
          NODE: ${{ matrix.node }}
          CELL_DIR: ${{ runner.temp }}
          ENVIRONMENT: ${{ needs.decide.outputs.environment }}
        run: bash app-src/scripts/ci/resolve-cell-state.sh

      - name: Setup SSH
        if: steps.cell.outputs.promoted == 'true'
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Wait for ArgoCD sync (per-node)
        if: steps.cell.outputs.promoted == 'true'
        env:
          SSH_OPTS: "-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          EXPECTED_SHA: ${{ steps.cell.outputs.deploy_branch_sha }}
          PROMOTED_APPS: ${{ matrix.node }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: bash app-src/scripts/ci/wait-for-argocd.sh

      - name: Wait for in-cluster services (per-node)
        if: steps.cell.outputs.promoted == 'true'
        env:
          PROMOTED_APPS: ${{ matrix.node }}
        run: bash app-src/scripts/ci/wait-for-in-cluster-services.sh

      - name: Verify buildSha (per-node)
        if: steps.cell.outputs.promoted == 'true'
        env:
          SOURCE_SHA_MAP: deploy-branch/.promote-state/source-sha-by-app.json
          EXPECTED_BUILDSHA: ${{ needs.decide.outputs.build_sha }}
          NODES: ${{ matrix.node }}
          MARKER_DIR: out
        run: bash app-src/scripts/ci/verify-buildsha.sh

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.cell.outputs.promoted == 'true'
        with:
          name: cell-verify-${{ matrix.node }}
          path: out/
          retention-days: 1

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  verify:
    runs-on: ubuntu-latest
    needs: [decide, promote-k8s, deploy-infra]
    if: |
      always() &&
      needs.promote-k8s.result == 'success' &&
      (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    environment: ${{ needs.decide.outputs.environment }}
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      DOMAIN: ${{ vars.DOMAIN }}
      K8S_NAMESPACE: cogni-${{ needs.decide.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Verify deployment
        run: |
          if [ -z "$DOMAIN" ]; then
            echo "⚠️ No DOMAIN — skipping verify"
            exit 0
          fi
          scripts/ci/verify-deployment.sh

      - name: Dump diagnostics on failure
        if: failure() && env.VM_HOST != ''
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          SSH_OPTS="-i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n argocd get applications -o wide" 2>&1 || true
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n $K8S_NAMESPACE get pods -o wide" 2>&1 || true
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl -n $K8S_NAMESPACE get events --sort-by=.lastTimestamp | tail -20" 2>&1 || true

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  e2e:
    runs-on: ubuntu-latest
    needs: [decide, promote-k8s, verify, verify-deploy]
    if: |
      needs.promote-k8s.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.verify-deploy.result == 'success'
    timeout-minutes: 10
    environment: ${{ needs.decide.outputs.environment }}
    env:
      NEXT_TELEMETRY_DISABLED: 1
      TEST_BASE_URL: https://${{ vars.DOMAIN }}
    steps:
      - name: Check prerequisites
        id: gate
        run: |
          if [ -z "$TEST_BASE_URL" ] || [ "$TEST_BASE_URL" = "https://" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ DOMAIN not set — skipping E2E"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.decide.outputs.head_sha }}

      - name: Setup Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: steps.gate.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        if: steps.gate.outputs.skip != 'true'
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright smoke tests
        if: steps.gate.outputs.skip != 'true'
        run: pnpm e2e:smoke

      - name: Upload E2E artifacts
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-${{ github.run_id }}
          path: e2e/artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: CI Telemetry
        if: always()
        uses: ./.github/actions/loki-ci-telemetry
        with:
          loki_url: ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          loki_user: ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          loki_token: ${{ secrets.GRAFANA_CLOUD_LOKI_API_KEY }}
          job_status: ${{ job.status }}

  aggregate-preview:
    needs: [decide, promote-k8s, deploy-infra, verify, verify-deploy, e2e]
    if: always() && needs.decide.outputs.environment == 'preview'
    runs-on: ubuntu-latest
    concurrency:
      group: aggregate-preview
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Download all per-cell artifacts
        if: always()
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          pattern: cell-*
          path: ${{ runner.temp }}/cells/
          merge-multiple: true

      - name: Decide outcome
        id: outcome
        env:
          ENV: preview
          CELLS_DIR: ${{ runner.temp }}/cells
          PROMOTE_RESULT: ${{ needs.promote-k8s.result }}
          DEPLOY_INFRA_RESULT: ${{ needs.deploy-infra.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          VERIFY_DEPLOY_RESULT: ${{ needs.verify-deploy.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: bash scripts/ci/aggregate-decide-outcome.sh

      - name: Update deploy/preview rollup (current-sha + source-sha-by-app)
        if: steps.outcome.outputs.outcome == 'dispatched'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/ci/aggregate-rollup.sh preview

      - name: Lock preview on success
        if: steps.outcome.outputs.outcome == 'dispatched'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: bash scripts/ci/set-preview-review-state.sh reviewing "$(cat /tmp/preview-current-sha)"

      - name: Unlock preview on failure
        if: always() && steps.outcome.outputs.outcome == 'failed'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DEPLOY_BRANCH: deploy/preview
        run: bash scripts/ci/set-preview-review-state.sh unlocked

      - name: Emit preview-flight-outcome artifact
        if: always()
        run: printf '%s\n' "${{ steps.outcome.outputs.outcome }}" > preview-flight-outcome.txt
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: preview-flight-outcome
          path: preview-flight-outcome.txt

  aggregate-production:
    needs: [decide, promote-k8s, verify, verify-deploy, e2e]
    if: |
      always() &&
      needs.decide.outputs.environment == 'production' &&
      needs.promote-k8s.result == 'success' &&
      needs.verify.result == 'success' &&
      needs.verify-deploy.result == 'success' &&
      needs.e2e.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: aggregate-production
      cancel-in-progress: false
    steps:
      # Production aggregator scripts are pinned to main so a
      # workflow_dispatch from any other ref cannot inject scripts that
      # write to deploy/production. Branch protection on main is the
      # gate; the dispatched workflow YAML can call only what main ships.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}

      - name: Download all per-cell artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.1.8
        with:
          pattern: cell-*
          path: ${{ runner.temp }}/cells/
          merge-multiple: true

      - name: Assert promoted cells were verified
        env:
          ENV: production
          CELLS_DIR: ${{ runner.temp }}/cells
          PROMOTE_RESULT: ${{ needs.promote-k8s.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          VERIFY_DEPLOY_RESULT: ${{ needs.verify-deploy.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          STRICT_FAIL: "1"
        run: bash scripts/ci/aggregate-decide-outcome.sh

      - name: Update deploy/production rollup (current-sha + source-sha-by-app)
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_AUTOMATION_BOT_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash scripts/ci/aggregate-rollup.sh production
