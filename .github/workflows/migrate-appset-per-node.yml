#
# One-shot cutover: retire the shared `cogni-<env>` ApplicationSet and adopt its
# live Applications into per-node `cogni-<env>-<node>` AppSets (axiom 18,
# structural LANE_ISOLATION; bug.0378). Idempotent — safe to re-run.
#
# Mechanism (zero downtime):
#   1. `kubectl delete applicationset cogni-<env> --cascade=orphan` removes the
#      shared object but ORPHANS its Applications — pods keep running and the
#      Application CRs keep self-healing from their deploy branches.
#   2. Apply every per-node AppSet. Each generates the same-named Application
#      (`<env>-<node>`), so the AppSet controller ADOPTS the orphaned Application
#      (no recreate, no prune).
#   3. Verify each Application is owned by its per-node AppSet and Healthy.
#
# After this runs once per env, ongoing flights/promotions apply only their own
# per-node AppSet (the workflows already orphan-delete the shared one defensively).
name: migrate-appset-per-node

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment whose shared AppSet to retire
        required: true
        type: choice
        options:
          - candidate-a
          - preview
          - production

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Setup SSH
        id: ssh-setup
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "$VM_HOST" ]; then
            echo "::error::No VM_HOST secret on ${{ inputs.environment }} — cannot migrate"
            exit 1
          fi
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_DEPLOY_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -T 10 -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pre-cutover snapshot
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          echo "::group::ApplicationSets + Applications BEFORE"
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl get applicationset -n argocd; echo ---; kubectl get applications -n argocd -o custom-columns=NAME:.metadata.name,OWNER:'.metadata.ownerReferences[0].name',SYNC:.status.sync.status,HEALTH:.status.health.status | grep -E 'NAME|${ENV}-' || true"
          echo "::endgroup::"

      - name: Orphan-delete shared AppSet + apply per-node AppSets
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(infra/k8s/argocd/"${ENV}"-*-applicationset.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no per-node AppSet files for ${ENV} — run 'pnpm gen:node-appset'"
            exit 1
          fi
          echo "Per-node AppSets to apply: ${files[*]}"
          # 1. Retire the shared AppSet WITHOUT pruning its Applications.
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl delete applicationset cogni-${ENV} -n argocd --cascade=orphan --ignore-not-found"
          # 2. Apply every per-node AppSet — each adopts its orphaned Application.
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            # shellcheck disable=SC2086
            scp $SSH_OPTS "$f" root@"$VM_HOST":/tmp/"$base"
            # shellcheck disable=SC2086
            ssh $SSH_OPTS root@"$VM_HOST" "kubectl apply -f /tmp/${base} -n argocd && rm -f /tmp/${base}"
          done

      - name: Verify adoption + health
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          SSH_OPTS: "-i /home/runner/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6"
          ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Poll each Application until its ownerRef flips to the per-node AppSet.
          # The AppSet controller's resync can exceed a fixed sleep, so poll
          # (~6x10s) rather than check once — a slow-but-successful adoption must
          # not false-fail this one-time live cutover into a confused manual re-run.
          fail=0
          for f in infra/k8s/argocd/"${ENV}"-*-applicationset.yaml; do
            node="$(basename "$f" -applicationset.yaml)"; node="${node#"${ENV}"-}"
            app="${ENV}-${node}"
            want="cogni-${ENV}-${node}"
            adopted=0
            for attempt in $(seq 1 6); do
              # shellcheck disable=SC2086
              owner="$(ssh $SSH_OPTS root@"$VM_HOST" "kubectl get application ${app} -n argocd -o jsonpath='{.metadata.ownerReferences[0].name}' 2>/dev/null" || true)"
              if [ "$owner" = "$want" ]; then adopted=1; break; fi
              echo "  ${app} owner='${owner}' (want '${want}') — attempt ${attempt}/6, retrying in 10s"
              sleep 10
            done
            if [ "$adopted" -eq 1 ]; then
              echo "✅ ${app} adopted by ${want}"
            else
              echo "::error::Application ${app} not adopted by ${want} after 60s (last owner='${owner}')"
              fail=1
            fi
          done
          # Confirm the shared AppSet is gone.
          # shellcheck disable=SC2086
          if ssh $SSH_OPTS root@"$VM_HOST" "kubectl get applicationset cogni-${ENV} -n argocd >/dev/null 2>&1"; then
            echo "::error::shared AppSet cogni-${ENV} still present"
            fail=1
          fi
          echo "::group::Applications AFTER"
          # shellcheck disable=SC2086
          ssh $SSH_OPTS root@"$VM_HOST" "kubectl get applications -n argocd -o custom-columns=NAME:.metadata.name,OWNER:'.metadata.ownerReferences[0].name',SYNC:.status.sync.status,HEALTH:.status.health.status | grep -E 'NAME|${ENV}-' || true"
          echo "::endgroup::"
          [ "$fail" -eq 0 ] || exit 1
          echo "Cutover complete for ${ENV}."
